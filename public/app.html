  const copyAll = () => { if (!saved.length) return; navigator.clipboard?.writeText(saved.map((s, i) => "— " + s.noun + " " + (i + 1) + " —\n" + s.text).join("\n\n")); setCopiedAll(true); setTimeout(() => setCopiedAll(false), 1500); };
  const week = DAYS.map(() => []); let auto = 0;
  saved.forEach((it) => { let d = typeof it.day === "number" ? it.day : (auto++ % 7); week[d].push(it); });

  // Calendar (month) state
  const today = new Date();
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [calYear, setCalYear] = useState(today.getFullYear());
  const monthName = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"][calMonth];
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const byDate = {};
  saved.forEach((s) => { if (s.date) { (byDate[s.date] = byDate[s.date] || []).push(s); } });
  const scheduledItems = saved.filter((s) => s.date);
  const prevMonth = () => { if (calMonth === 0) { setCalMonth(11); setCalYear(calYear - 1); } else setCalMonth(calMonth - 1); };
  const nextMonth = () => { if (calMonth === 11) { setCalMonth(0); setCalYear(calYear + 1); } else setCalMonth(calMonth + 1); };

  const tab = (id, label) => <button onClick={() => setView(id)} style={{ fontFamily: SAN, fontSize: 12.5, fontWeight: 700, padding: "5px 12px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${view === id ? C.ink : C.line}`, background: view === id ? C.ink : "transparent", color: view === id ? C.cream : C.faint }}>{label}</button>;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", justifyContent: "flex-end" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(28,24,21,.4)" }} />
      <div style={{ position: "relative", width: "min(460px, 94vw)", height: "100%", background: C.cream, borderLeft: `2px solid ${C.ink}`, overflowY: "auto", padding: "24px 20px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
          <span style={{ fontFamily: SER, fontWeight: 700, fontSize: 22, color: C.ink }}>Saved <span style={{ color: C.amber }}>★</span></span>
          <button onClick={onClose} style={miniBtn(C.faint)}>close ✕</button>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
          {tab("list", "List")}{tab("week", "Week")}{tab("calendar", "Calendar")}
          <div style={{ flex: 1 }} />
          <button onClick={copyAll} disabled={!saved.length} style={{ fontFamily: SAN, fontSize: 12.5, fontWeight: 700, color: saved.length ? C.cream : C.faint, background: saved.length ? C.amber : "transparent", border: `1.5px solid ${saved.length ? C.amber : C.line}`, borderRadius: 999, padding: "5px 13px", cursor: saved.length ? "pointer" : "default" }}>{copiedAll ? "copied all ✓" : "copy all"}</button>
        </div>
        {!saved.length && <p style={{ fontFamily: SAN, fontSize: 14, color: C.faint }}>Nothing saved yet. Hit “save ☆” on any result and it'll collect here for this session.</p>}
        {view === "list" && <div style={{ display: "grid", gap: 12 }}>{saved.map((s) => (
          <div key={s.id} style={savedCard}><div style={savedHead}><span style={{ fontFamily: SER, fontStyle: "italic", fontSize: 13, color: C.faint }}>{s.noun}</span><div style={{ display: "flex", gap: 12 }}><CopyBtn text={s.text} /><button onClick={() => remove(s.id)} style={miniBtn(C.amberDeep)}>remove</button></div></div><p style={savedText}>{s.text}</p></div>
        ))}</div>}
        {view === "week" && saved.length > 0 && <div style={{ display: "grid", gap: 14 }}>{DAYS.map((d, di) => (
          <div key={d}><div style={{ fontFamily: SAN, fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.4, color: C.amber, borderBottom: `1.5px solid ${C.line}`, paddingBottom: 4, marginBottom: 8 }}>{d}</div>
            {week[di].length === 0 && <p style={{ fontFamily: SAN, fontSize: 12.5, color: C.faint, fontStyle: "italic", margin: "0 0 4px" }}>— open —</p>}
            <div style={{ display: "grid", gap: 8 }}>{week[di].map((s) => (
              <div key={s.id} style={{ ...savedCard, padding: "11px 13px" }}><div style={savedHead}><span style={{ fontFamily: SER, fontStyle: "italic", fontSize: 12, color: C.faint }}>{s.noun}</span><div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <select value={typeof s.day === "number" ? s.day : di} onChange={(e) => update(s.id, { day: Number(e.target.value) })} style={{ fontFamily: SAN, fontSize: 11.5, color: C.ink, background: C.cream, border: `1px solid ${C.line}`, borderRadius: 2, padding: "2px 4px" }}>{DAYS.map((dd, i) => <option key={dd} value={i}>{dd}</option>)}</select>
                <CopyBtn text={s.text} /><button onClick={() => remove(s.id)} style={miniBtn(C.amberDeep)}>✕</button>
              </div></div><p style={{ ...savedText, fontSize: 13.5, maxHeight: 88, overflow: "hidden" }}>{s.text}</p></div>
            ))}</div>
          </div>
        ))}</div>}
        {view === "calendar" && <div>
          <div style={{ background: "#fff", border: `1.5px solid ${C.line}`, borderLeft: `4px solid ${C.moss}`, borderRadius: 2, padding: "10px 12px", marginBottom: 14 }}>
            <p style={{ fontFamily: SAN, fontSize: 12, color: C.faint, lineHeight: 1.5, margin: 0 }}>Give each saved post a date below, then tap <b>Add to my calendar</b> to drop them into your Google/Apple/Outlook calendar — it'll remind you to post. Nothing auto-posts.</p>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <button onClick={prevMonth} style={miniBtn(C.ink)}>‹ prev</button>
            <span style={{ fontFamily: SER, fontWeight: 700, fontSize: 16, color: C.ink }}>{monthName} {calYear}</span>
            <button onClick={nextMonth} style={miniBtn(C.ink)}>next ›</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3, marginBottom: 14 }}>
            {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => <div key={i} style={{ fontFamily: SAN, fontSize: 10, fontWeight: 700, color: C.faint, textAlign: "center", padding: "2px 0" }}>{d}</div>)}
            {Array.from({ length: firstDow }).map((_, i) => <div key={"e" + i} />)}
            {Array.from({ length: daysInMonth }).map((_, i) => {
              const day = i + 1;
              const ds = calYear + "-" + pad2(calMonth + 1) + "-" + pad2(day);
              const count = (byDate[ds] || []).length;
              const isToday = ds === ymd(today);
              return <div key={day} style={{ minHeight: 34, border: `1px solid ${count ? C.moss : C.line}`, borderRadius: 3, padding: 2, background: count ? "rgba(31,58,95,.07)" : "#fff", textAlign: "center" }}>
                <div style={{ fontFamily: SAN, fontSize: 10.5, fontWeight: isToday ? 700 : 400, color: isToday ? C.amber : C.ink }}>{day}</div>
                {count > 0 && <div style={{ fontFamily: SAN, fontSize: 9, color: C.moss, fontWeight: 700 }}>{count} post{count > 1 ? "s" : ""}</div>}
              </div>;
            })}
          </div>
          <button onClick={() => downloadICS(scheduledItems, "closeassist-content-calendar.ics")} disabled={!scheduledItems.length} style={{ width: "100%", fontFamily: SAN, fontSize: 13.5, fontWeight: 700, color: scheduledItems.length ? "#fff" : C.faint, background: scheduledItems.length ? C.moss : "transparent", border: `1.5px solid ${scheduledItems.length ? C.moss : C.line}`, borderRadius: 3, padding: "11px", cursor: scheduledItems.length ? "pointer" : "default", marginBottom: 16 }}>Add to my calendar ({scheduledItems.length} dated)</button>
          <div style={{ display: "grid", gap: 10 }}>{saved.map((s) => (
            <div key={s.id} style={{ ...savedCard, padding: "11px 13px" }}>
              <div style={savedHead}><span style={{ fontFamily: SER, fontStyle: "italic", fontSize: 12, color: C.faint }}>{s.noun}</span>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <input type="date" value={s.date || ""} onChange={(e) => update(s.id, { date: e.target.value })} style={{ fontFamily: SAN, fontSize: 11.5, color: C.ink, background: C.cream, border: `1px solid ${C.line}`, borderRadius: 2, padding: "2px 4px" }} />
                  <button onClick={() => downloadICS([s], "post.ics")} disabled={!s.date} style={miniBtn(s.date ? C.moss : C.faint)}>+cal</button>
                  <button onClick={() => remove(s.id)} style={miniBtn(C.amberDeep)}>✕</button>
                </div></div>
              <p style={{ ...savedText, fontSize: 13, maxHeight: 70, overflow: "hidden" }}>{s.text}</p>
            </div>
          ))}</div>
        </div>}
      </div>
    </div>
  );
}

function ProfileDrawer({ open, onClose }) {
  const { profile, setProfile } = useContext(ProfileCtx);
  if (!open) return null;
  const F = (key, label, ph) => (
    <Field label={label}><input style={inputStyle} value={profile[key] || ""} onChange={(e) => setProfile({ ...profile, [key]: e.target.value })} placeholder={ph} /></Field>
  );
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", justifyContent: "flex-end" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(28,24,21,.4)" }} />
      <div style={{ position: "relative", width: "min(440px, 94vw)", height: "100%", background: C.cream, borderLeft: `2px solid ${C.ink}`, overflowY: "auto", padding: "24px 22px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
          <span style={{ fontFamily: SER, fontWeight: 700, fontSize: 22, color: C.ink }}>My Brand</span>
          <button onClick={onClose} style={miniBtn(C.faint)}>close ✕</button>
        </div>
        <p style={{ fontFamily: SAN, fontSize: 13, color: C.faint, lineHeight: 1.5, marginTop: 0, marginBottom: 18 }}>Fill these in once and they'll flow into every message and post — sign-offs, CTAs, and footers. Leave blanks empty and they're simply skipped.</p>
        {F("name", "Your name", "e.g. Jordan Rivera")}
        {F("team", "Team name", "e.g. The Rivera Group")}
        {F("brokerage", "Brokerage", "e.g. Keystone Realty")}
        {F("phone", "Contact (phone / link)", "e.g. 555-0142 or jordan@…")}
        {F("area", "Primary area / market", "e.g. East Nashville")}
        <p style={{ fontFamily: SAN, fontSize: 11.5, color: C.faint, lineHeight: 1.5 }}>Saved for this session only. Always confirm your brokerage's branding & disclosure requirements before publishing.</p>
      </div>
    </div>
  );
}

function LoginScreen({ onSuccess }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const submit = async () => {
    if (!pw.trim()) return setErr("Enter the password.");
    setBusy(true); setErr("");
    try {
      const r = await fetch(API_LOGIN, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: pw }) });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || "Login failed.");
      TOKEN = data.token;
      try { await window.storage.set("closeassist-token", data.token); } catch {}
      onSuccess();
    } catch (e) { setErr(e.message); } finally { setBusy(false); }
  };
  return (
    <div style={{ minHeight: "100vh", background: C.cream, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, backgroundImage: "radial-gradient(circle at 15% 20%, rgba(192,57,43,.07), transparent 42%), radial-gradient(circle at 85% 80%, rgba(31,58,95,.07), transparent 45%)" }}>
      <div style={{ width: "min(380px, 100%)", background: C.paper, border: `2px solid ${C.ink}`, borderRadius: 6, padding: 30, boxShadow: `8px 8px 0 ${C.amber}` }}>
        <div style={{ fontFamily: SER, fontWeight: 700, fontSize: 30, color: C.ink, letterSpacing: -0.5 }}>Close<span style={{ color: C.amber }}>Assist</span></div>
        <p style={{ fontFamily: SER, fontStyle: "italic", fontSize: 15, color: C.faint, margin: "2px 0 22px" }}>your AI sales desk</p>
        <label style={{ display: "block", fontFamily: SAN, fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.faint, marginBottom: 6 }}>Password</label>
        <input style={inputStyle} type="password" value={pw} onChange={(e) => setPw(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="enter your access password" autoFocus />
        {err && <p style={{ fontFamily: SAN, fontSize: 13, color: C.amberDeep, margin: "10px 0 0" }}>{err}</p>}
        <button onClick={submit} disabled={busy} style={{ width: "100%", marginTop: 16, fontFamily: SAN, fontSize: 15, fontWeight: 700, color: C.cream, background: busy ? C.faint : C.amber, border: "none", borderRadius: 3, padding: "13px", cursor: busy ? "default" : "pointer" }}>{busy ? "checking…" : "Enter →"}</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("follow");
  const [saved, setSaved] = useState([]);
  const [profile, setProfile] = useState({});
  const [drawer, setDrawer] = useState(null); // 'saved' | 'brand' | 'backend' | null
  const [authed, setAuthed] = useState(false);
  const [authChecked, setAuthChecked] = useState(false);
  const styleRef = useRef(null);
  const meta = ALL.find((x) => x.id === tab);
  const Active = meta.el;
  const accent = (GROUPS.find((g) => g.tabs.some((tb) => tb.id === tab)) || {}).color || C.amber;
  useEffect(() => { if (!styleRef.current) { const s = document.createElement("style"); s.textContent = FONTS + "@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}"; document.head.appendChild(s); styleRef.current = s; } }, []);
  useEffect(() => { (async () => { if (STORE_OK) { try { const r = await window.storage.get("closeassist-token"); if (r && r.value) { TOKEN = r.value; setAuthed(true); } } catch {} } setAuthChecked(true); })(); }, []);
  useEffect(() => {
    const onLogout = () => { setAuthed(false); };
    window.addEventListener("closeassist-logout", onLogout);
    return () => window.removeEventListener("closeassist-logout", onLogout);
  }, []);
  const signOut = async () => { TOKEN = ""; try { await window.storage.delete("closeassist-token"); } catch {} setAuthed(false); };
  const add = (item) => setSaved((s) => [{ id: Date.now() + Math.random(), ...item }, ...s]);
  const remove = (id) => setSaved((s) => s.filter((x) => x.id !== id));
  const update = (id, patch) => setSaved((s) => s.map((x) => (x.id === id ? { ...x, ...patch } : x)));
  const hasBrand = Object.values(profile).some((v) => v && v.trim());

  const headBtn = (label, onClick, filled) => <button onClick={onClick} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 700, color: filled ? C.cream : C.ink, background: filled ? C.ink : "transparent", border: `1.5px solid ${C.ink}`, borderRadius: 999, padding: "7px 15px", cursor: "pointer" }}>{label}</button>;

  if (!authChecked) return <div style={{ minHeight: "100vh", background: C.cream }} />;
  if (!authed) return <LoginScreen onSuccess={() => setAuthed(true)} />;

  return (
    <ProfileCtx.Provider value={{ profile, setProfile }}>
      <SavedCtx.Provider value={{ saved, add, remove, update }}>
        <div style={{ minHeight: "100vh", background: C.cream, backgroundImage: "radial-gradient(circle at 12% 15%, rgba(192,57,43,.06), transparent 40%), radial-gradient(circle at 88% 80%, rgba(31,58,95,.06), transparent 45%)", padding: "0 0 60px" }}>
          <div style={{ borderBottom: `2px solid ${C.ink}`, padding: "26px 28px 22px", maxWidth: 820, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 12, justifyContent: "space-between", flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
                <span style={{ fontFamily: SER, fontWeight: 700, fontSize: 30, color: C.ink, letterSpacing: -0.5 }}>Close<span style={{ color: C.amber }}>Assist</span></span>
                <span style={{ fontFamily: SER, fontStyle: "italic", fontSize: 15, color: C.faint }}>your AI sales desk</span>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {headBtn(hasBrand ? "⚙ Brand ✓" : "⚙ Brand", () => setDrawer("brand"), hasBrand)}
                {headBtn("★ Saved" + (saved.length ? " (" + saved.length + ")" : ""), () => setDrawer("saved"), false)}
                {headBtn("Sign out", signOut, false)}
              </div>
            </div>
            <p style={{ fontFamily: SAN, fontSize: 13.5, color: C.faint, marginTop: 6, maxWidth: 540, lineHeight: 1.5 }}>Follow up faster, handle objections cleaner, post more often — without the blank-page grind.</p>
          </div>

          <div style={{ maxWidth: 820, margin: "0 auto", padding: "18px 28px 0" }}>
            {GROUPS.map((g) => (
              <div key={g.name} style={{ marginBottom: 14 }}>
                <div style={{ fontFamily: SAN, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.6, color: g.color, marginBottom: 7, display: "flex", alignItems: "center", gap: 7 }}><span style={{ width: 9, height: 9, borderRadius: 999, background: g.color, display: "inline-block" }} />{g.name}</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {g.tabs.map((x) => { const on = x.id === tab; return <button key={x.id} onClick={() => setTab(x.id)} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 600, padding: "8px 13px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${on ? g.color : C.line}`, background: on ? g.color : "transparent", color: on ? "#fff" : C.faint }}>{x.label}</button>; })}
                </div>
              </div>
            ))}
          </div>

          <AccentCtx.Provider value={accent}>
          <div style={{ maxWidth: 820, margin: "8px auto 0", padding: 28, background: C.paper, border: `2px solid ${accent}`, borderRadius: 4 }}>
            <p style={{ fontFamily: SER, fontStyle: "italic", fontSize: 17, color: accent, marginTop: 0, marginBottom: 22 }}>{meta.sub}</p>
            <Active />
          </div>
          </AccentCtx.Provider>

          <p style={{ maxWidth: 820, margin: "18px auto 0", padding: "0 28px", fontFamily: SAN, fontSize: 11.5, color: C.faint, lineHeight: 1.5 }}>Drafts are AI-generated — read before you send, and follow your local real estate advertising, fair-housing & consent (e.g. TCPA) rules. Brand details and saved items last for this session only.</p>
        </div>
        <SavedDrawer open={drawer === "saved"} onClose={() => setDrawer(null)} />
        <ProfileDrawer open={drawer === "brand"} onClose={() => setDrawer(null)} />
      </SavedCtx.Provider>
    </ProfileCtx.Provider>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
