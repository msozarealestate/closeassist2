<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CloseAssist</title>
<style>html,body{margin:0;background:#ffffff}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
if (!window.storage) {
  window.storage = {
    get: async (k) => { const v = localStorage.getItem(k); return v == null ? null : { key: k, value: v }; },
    set: async (k, val) => { localStorage.setItem(k, val); return { key: k, value: val }; },
    delete: async (k) => { localStorage.removeItem(k); return { key: k, deleted: true }; },
    list: async (prefix) => ({ keys: Object.keys(localStorage).filter(x => !prefix || x.startsWith(prefix)) }),
  };
}
const { useState, useRef, useEffect, useContext, createContext } = React;


// ─────────────────────────────────────────────────────────────
// CloseAssist — an AI sales toolkit for real estate agents.
// 17 tools across Outreach, Social Content, and Listings/Appointments.
// A shared Brand profile flows into everything; results can be
// refined in place, saved, spread across a week, and copied in bulk.
// ─────────────────────────────────────────────────────────────

const FONTS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,0,700;9..144,1,400;9..144,1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
`;

const C = { ink: "#16243a", cream: "#ffffff", paper: "#f4f6f8", amber: "#c0392b", amberDeep: "#902519", moss: "#1f3a5f", line: "#d9dee5", faint: "#697586" };
const SAN = "'Hanken Grotesk', sans-serif";
const SER = "'Fraunces', serif";
const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

const SavedCtx = createContext({ saved: [], add: () => {}, remove: () => {}, update: () => {} });
const ProfileCtx = createContext({ profile: {}, setProfile: () => {} });
const AccentCtx = createContext("#c0392b"); // current group accent

// Same-origin API (the app is served from the same Vercel project as /api/*).
const API_GENERATE = "/api/generate";
const API_ANALYZE = "/api/analyze";
const API_LOGIN = "/api/login";
const API_FUB = "/api/fub";
let TOKEN = "";

async function fubCall(payload) {
  const res = await fetch(API_FUB, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-app-token": TOKEN },
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401 && (!data || !data.error || /unauthor/i.test(data.error))) {
    TOKEN = ""; try { await window.storage.delete("closeassist-token"); } catch {}
    window.dispatchEvent(new Event("closeassist-logout"));
    throw new Error("Session expired — please log in again.");
  }
  if (!res.ok) throw new Error(data.error || ("Request failed (" + res.status + ")"));
  return data;
}

async function askClaude(system, user) {
  const res = await fetch(API_GENERATE, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-app-token": TOKEN },
    body: JSON.stringify({ system, user, max_tokens: 1600 }),
  });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) { TOKEN = ""; try { await window.storage.delete("closeassist-token"); } catch {} window.dispatchEvent(new Event("closeassist-logout")); throw new Error("Session expired — please log in again."); }
  if (!res.ok) throw new Error(data.error || ("Request failed (" + res.status + ")"));
  return (data.text || "").trim();
}

function toCards(text) {
  const parts = text.split(/\n?===+\n?/).map((s) => s.trim()).filter(Boolean);
  return parts.length ? parts : [text];
}

function brandContext(p) {
  const bits = [];
  if (p.name) bits.push("Agent name: " + p.name);
  if (p.team) bits.push("Team: " + p.team);
  if (p.brokerage) bits.push("Brokerage: " + p.brokerage);
  if (p.phone) bits.push("Contact: " + p.phone);
  if (p.area) bits.push("Primary market/area: " + p.area);
  if (!bits.length) return "";
  return "\n\nAGENT BRANDING — weave these in naturally where appropriate (sign-offs, CTAs, post footers, signatures). Never invent contact details beyond what's listed: " + bits.join("; ") + ".";
}

function useTool() {
  const { profile } = useContext(ProfileCtx);
  const [cards, setCards] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const sysRef = useRef("");

  const generate = async (system, user) => {
    const full = system + brandContext(profile);
    setLoading(true); setError(""); setCards(null); sysRef.current = full;
    try { setCards(toCards(await askClaude(full, user))); }
    catch (e) { setError(e.message || "Something went wrong."); }
    finally { setLoading(false); }
  };

  const refine = async (i, instruction) => {
    const original = cards[i];
    const u = "Here is a draft you wrote:\n\n" + original + "\n\nRevise it based on this instruction: " + instruction + "\n\nReturn ONLY the revised version — no commentary.";
    const out = await askClaude(sysRef.current, u);
    setCards((cs) => cs.map((c, idx) => (idx === i ? out.trim() : c)));
  };

  return { cards, error, loading, generate, refine, setError };
}

const miniBtn = (color) => ({ fontFamily: SAN, fontSize: 12, fontWeight: 600, letterSpacing: 0.3, color, background: "transparent", border: "none", cursor: "pointer", padding: 0 });

function CopyBtn({ text }) {
  const [done, setDone] = useState(false);
  return <button onClick={() => { navigator.clipboard?.writeText(text); setDone(true); setTimeout(() => setDone(false), 1400); }} style={miniBtn(done ? C.moss : C.amber)}>{done ? "copied ✓" : "copy"}</button>;
}

function Field({ label, children }) {
  return (
    <label style={{ display: "block", marginBottom: 16 }}>
      <span style={{ display: "block", fontFamily: SAN, fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.faint, marginBottom: 6 }}>{label}</span>
      {children}
    </label>
  );
}

const inputStyle = { width: "100%", boxSizing: "border-box", fontFamily: SAN, fontSize: 15, color: C.ink, background: C.paper, border: `1.5px solid ${C.line}`, borderRadius: 2, padding: "11px 13px", outline: "none", resize: "vertical" };

function Chips({ options, value, onChange }) {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
      {options.map((o) => {
        const on = o === value;
        return <button key={o} onClick={() => onChange(o)} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 600, padding: "7px 13px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${on ? C.ink : C.line}`, background: on ? C.ink : "transparent", color: on ? C.cream : C.faint }}>{o}</button>;
      })}
    </div>
  );
}

function RunButton({ onClick, loading, children }) {
  const accent = useContext(AccentCtx);
  return <button onClick={onClick} disabled={loading} style={{ fontFamily: SAN, fontSize: 15, fontWeight: 700, letterSpacing: 0.4, color: C.cream, background: loading ? C.faint : accent, border: "none", borderRadius: 2, padding: "13px 26px", cursor: loading ? "default" : "pointer", boxShadow: loading ? "none" : `4px 4px 0 ${C.ink}` }}>{loading ? "thinking…" : children}</button>;
}

function Card({ text, index, noun, onRefine }) {
  const { add } = useContext(SavedCtx);
  const accent = useContext(AccentCtx);
  const [saved, setSaved] = useState(false);
  const [open, setOpen] = useState(false);
  const [instr, setInstr] = useState("");
  const [busy, setBusy] = useState(false);
  const doSave = () => { add({ text, noun }); setSaved(true); setTimeout(() => setSaved(false), 1400); };
  const doRefine = async () => { if (!instr.trim()) return; setBusy(true); try { await onRefine(index, instr); setInstr(""); setOpen(false); } finally { setBusy(false); } };
  return (
    <div style={{ background: C.paper, border: `1.5px solid ${C.line}`, borderLeft: `4px solid ${accent}`, borderRadius: 2, padding: "16px 18px", animation: `rise .4s ${index * 0.06}s both` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontFamily: SER, fontStyle: "italic", fontSize: 14, color: accent }}>{noun} {index + 1}</span>
        <div style={{ display: "flex", gap: 14 }}>
          <CopyBtn text={text} />
          <button onClick={doSave} style={miniBtn(saved ? C.moss : C.faint)}>{saved ? "saved ★" : "save ☆"}</button>
          <button onClick={() => setOpen((o) => !o)} style={miniBtn(open ? C.amberDeep : C.faint)}>refine</button>
        </div>
      </div>
      <p style={{ fontFamily: SAN, fontSize: 15, lineHeight: 1.55, color: C.ink, whiteSpace: "pre-wrap", margin: 0 }}>{busy ? "reworking…" : text}</p>
      {open && (
        <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
          <input style={{ ...inputStyle, flex: 1, minWidth: 200, fontSize: 14 }} value={instr} onChange={(e) => setInstr(e.target.value)} placeholder="e.g. shorter, warmer, add the price, drop the emoji…" onKeyDown={(e) => e.key === "Enter" && doRefine()} />
          <button onClick={doRefine} disabled={busy} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 700, color: C.cream, background: busy ? C.faint : C.ink, border: "none", borderRadius: 2, padding: "0 16px", cursor: busy ? "default" : "pointer" }}>{busy ? "…" : "regenerate"}</button>
        </div>
      )}
    </div>
  );
}

function Results({ cards, error, noun = "option", onRefine }) {
  if (error) return <p style={{ fontFamily: SAN, color: C.amberDeep, fontSize: 14 }}>{error}</p>;
  if (!cards) return null;
  return <div style={{ display: "grid", gap: 14, marginTop: 4 }}>{cards.map((c, i) => <Card key={i} text={c} index={i} noun={noun} onRefine={onRefine} />)}</div>;
}

// helper to build a standard text/textarea tool quickly is avoided for clarity; each tool is explicit below.

// ============ OUTREACH ============
function FollowUp() {
  const [name, setName] = useState(""); const [ctx, setCtx] = useState(""); const [channel, setChannel] = useState("Text"); const [tone, setTone] = useState("Warm"); const t = useTool();
  const run = () => { if (!ctx.trim()) return t.setError("Tell me a bit about the lead first.");
    t.generate("You are an elite real estate sales coach writing follow-up messages for an agent. Natural, human, non-pushy messages that move things forward and invite a reply. Keep " + channel.toLowerCase() + "s brief. Tone: " + tone + ". Return exactly 3 distinct messages separated by a line containing only ===. No preamble or labels.", "Lead name: " + (name || "(unknown)") + "\nChannel: " + channel + "\nSituation:\n" + ctx); };
  return (<div>
    <Field label="Lead's first name (optional)"><input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Maya" /></Field>
    <Field label="What's going on with this lead?"><textarea style={{ ...inputStyle, minHeight: 90 }} value={ctx} onChange={(e) => setCtx(e.target.value)} placeholder="Inquired about the 3-bed on Oak St two weeks ago, went quiet. First-time buyer, nervous about budget." /></Field>
    <div style={{ display: "flex", gap: 28, flexWrap: "wrap", marginBottom: 18 }}>
      <Field label="Channel"><Chips options={["Text", "Email", "DM"]} value={channel} onChange={setChannel} /></Field>
      <Field label="Tone"><Chips options={["Warm", "Direct", "Playful", "Professional"]} value={tone} onChange={setTone} /></Field>
    </div>
    <RunButton onClick={run} loading={t.loading}>Write follow-ups →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Objection() {
  const [obj, setObj] = useState(""); const t = useTool();
  const presets = ["We want to wait until prices come down.", "Your commission is too high.", "We're going to try selling it ourselves first.", "We need to think about it."];
  const run = () => { if (!obj.trim()) return t.setError("Paste the objection you're hearing.");
    t.generate("You are a master real estate sales coach. The agent pastes a client objection. Give 3 genuinely different responses (empathize & reframe / ask a clarifying question / address head-on with value). Each sayable almost verbatim, confident, never slimy. Start each with a 2-4 word strategy label in brackets. Separate the 3 with a line containing only ===.", "Objection: " + obj); };
  return (<div>
    <Field label="The objection"><textarea style={{ ...inputStyle, minHeight: 80 }} value={obj} onChange={(e) => setObj(e.target.value)} placeholder="Type or paste what the client said…" /></Field>
    <div style={{ marginBottom: 18 }}><span style={{ fontFamily: SAN, fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.faint, display: "block", marginBottom: 8 }}>common ones</span>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{presets.map((p) => <button key={p} onClick={() => setObj(p)} style={{ fontFamily: SAN, fontSize: 12.5, padding: "6px 11px", borderRadius: 999, cursor: "pointer", border: `1.5px dashed ${C.line}`, background: "transparent", color: C.faint }}>{p}</button>)}</div></div>
    <RunButton onClick={run} loading={t.loading}>Coach me →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Warmup() {
  const [list, setList] = useState(""); const [angle, setAngle] = useState("Check in"); const t = useTool();
  const run = () => { const lines = list.split("\n").map((l) => l.trim()).filter(Boolean);
    if (!lines.length) return t.setError("Paste at least one lead — one per line.");
    if (lines.length > 12) return t.setError("Keep it to 12 leads per batch so each message gets real attention.");
    t.generate("You are a real estate re-engagement specialist. The agent pastes cold leads, one per line (name + notes). Write ONE short personalized re-engagement text per lead — casual, specific to their notes, easy to reply to, no pressure. Overall angle: " + angle + ". Begin each with the lead's name in brackets, e.g. [Maya]. 1-3 sentences each. One per lead, same order, separated by a line containing only ===.", "Leads:\n" + lines.join("\n")); };
  return (<div>
    <Field label="Paste your old leads — one per line, add notes if you have them"><textarea style={{ ...inputStyle, minHeight: 120 }} value={list} onChange={(e) => setList(e.target.value)} placeholder={"Maya — wanted a 3-bed under 600k, went quiet in spring\nThe Patels — relocating for work, no firm timeline\nJordan — first-time buyer, nervous about rates"} /></Field>
    <Field label="Angle for the batch"><Chips options={["Check in", "Market update", "New listing", "Year-end nudge"]} value={angle} onChange={setAngle} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Warm them up →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="lead" onRefine={t.refine} /></div>
  </div>);
}

function Referral() {
  const [who, setWho] = useState("Past client"); const [ctx, setCtx] = useState(""); const [channel, setChannel] = useState("Text"); const t = useTool();
  const run = () => { t.generate("You are a real estate relationship coach. Write warm, low-pressure referral-ask messages that don't feel transactional — lead with genuine connection, then a soft ask for who they might know thinking of buying/selling. Audience: " + who + ". Channel: " + channel + ". Return 3 distinct versions separated by a line containing only ===.", "Audience: " + who + "\nAny context: " + (ctx || "(none)")); };
  return (<div>
    <Field label="Who are you asking?"><Chips options={["Past client", "Friend / sphere", "Recent buyer", "Recent seller"]} value={who} onChange={setWho} /></Field>
    <Field label="Any context? (optional)"><textarea style={{ ...inputStyle, minHeight: 70 }} value={ctx} onChange={(e) => setCtx(e.target.value)} placeholder="Closed their sale 6 months ago, we got along great. Spring market heating up." /></Field>
    <Field label="Channel"><Chips options={["Text", "Email", "DM"]} value={channel} onChange={setChannel} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Write the ask →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Voicemail() {
  const [scenario, setScenario] = useState("Expired listing"); const [name, setName] = useState(""); const [ctx, setCtx] = useState(""); const t = useTool();
  const run = () => { t.generate("You are a real estate cold-outreach coach. Produce a matched pair for this scenario: a 15-20 second VOICEMAIL script (natural, confident, leaves a reason to call back) and a paired FOLLOW-UP TEXT to send right after. Two sections, each starting with a bracketed label [Voicemail Script] then [Follow-Up Text], separated by a line containing only ===. Scenario: " + scenario + ".", "Scenario: " + scenario + "\nName: " + (name || "(unknown)") + "\nContext: " + (ctx || "(none)")); };
  return (<div>
    <Field label="Scenario"><Chips options={["Expired listing", "FSBO", "Cold lead", "Open-house follow-up", "Past client check-in"]} value={scenario} onChange={setScenario} /></Field>
    <Field label="Their name (optional)"><input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. the Garcias" /></Field>
    <Field label="Anything specific? (optional)"><textarea style={{ ...inputStyle, minHeight: 60 }} value={ctx} onChange={(e) => setCtx(e.target.value)} placeholder="Listing expired last week, was overpriced for the area." /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Build voicemail + text →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="part" onRefine={t.refine} /></div>
  </div>);
}

function Review() {
  const [name, setName] = useState(""); const [deal, setDeal] = useState("Helped them buy"); const [platform, setPlatform] = useState("Google"); const t = useTool();
  const run = () => { t.generate("You are a real estate client-experience coach. Write warm, specific, easy-yes review-request messages for " + platform + ". Reference the journey, make it effortless, include a clear spot for the review link as [REVIEW LINK]. Transaction: " + deal + ". Return 3 distinct versions separated by a line containing only ===.", "Client: " + (name || "(client)") + "\nTransaction: " + deal + "\nPlatform: " + platform); };
  return (<div>
    <Field label="Client's name (optional)"><input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Sam" /></Field>
    <Field label="What was the transaction?"><Chips options={["Helped them buy", "Helped them sell", "Both", "Helped them rent"]} value={deal} onChange={setDeal} /></Field>
    <Field label="Review platform"><Chips options={["Google", "Zillow", "Facebook", "Realtor.com"]} value={platform} onChange={setPlatform} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Ask for the review →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

// ============ SOCIAL CONTENT ============
function Content() {
  const [topic, setTopic] = useState(""); const [platform, setPlatform] = useState("Instagram"); const t = useTool();
  const run = () => { if (!topic.trim()) return t.setError("Give me a topic or angle to post about.");
    t.generate("You are a real estate social media strategist. Write 3 ready-to-post " + platform + " posts on the topic. Match platform voice/length. Strong hook, real value, soft CTA, tasteful line breaks, a few relevant hashtags where expected. Separate the 3 with a line containing only ===.", "Topic: " + topic + "\nPlatform: " + platform); };
  return (<div>
    <Field label="What do you want to post about?"><textarea style={{ ...inputStyle, minHeight: 80 }} value={topic} onChange={(e) => setTopic(e.target.value)} placeholder="5 things first-time buyers always forget to budget for." /></Field>
    <Field label="Platform"><Chips options={["Instagram", "Facebook", "LinkedIn", "TikTok", "X"]} value={platform} onChange={setPlatform} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Generate posts →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Engagement() {
  const [offer, setOffer] = useState(""); const [keyword, setKeyword] = useState(""); const [action, setAction] = useState("Comment below"); const [dest, setDest] = useState(""); const [platform, setPlatform] = useState("Instagram"); const t = useTool();
  const run = () => { if (!offer.trim()) return t.setError("What are people getting? Describe the offer / lead magnet.");
    if (!keyword.trim()) return t.setError("Give me the trigger word people should send.");
    const how = action === "Text a keyword" ? "they TEXT the word \"" + keyword + "\"" + (dest ? " to " + dest : "") : action === "DM the keyword" ? "they DM the word \"" + keyword + "\"" : "they COMMENT the word \"" + keyword + "\" below";
    t.generate("You are a real estate social media strategist writing high-engagement lead-magnet posts for " + platform + ". Each offers something valuable and drives ONE clear action: " + how + " to receive it. Scroll-stopping hook, tease value, mild urgency/curiosity, unmissable CTA repeated near the end. Match platform voice/length, tasteful line breaks, an emoji or two if on-brand, a few relevant hashtags. Stay truthful, avoid fair-housing-risky language. Return 3 distinct versions separated by a line containing only ===.", "Offer: " + offer + "\nTrigger: " + keyword + "\nAction: " + how + "\nPlatform: " + platform); };
  return (<div>
    <Field label="What do they get? (the offer / lead magnet)"><textarea style={{ ...inputStyle, minHeight: 70 }} value={offer} onChange={(e) => setOffer(e.target.value)} placeholder="A free home-value report · this week's new listings · a first-time buyer's guide" /></Field>
    <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
      <div style={{ flex: "1 1 160px" }}><Field label="Trigger word"><input style={inputStyle} value={keyword} onChange={(e) => setKeyword(e.target.value.toUpperCase())} placeholder="VALUE" /></Field></div>
      <div style={{ flex: "1 1 160px" }}><Field label="Send it where? (optional)"><input style={inputStyle} value={dest} onChange={(e) => setDest(e.target.value)} placeholder="e.g. 555-0142" /></Field></div>
    </div>
    <Field label="How do they respond?"><Chips options={["Comment below", "Text a keyword", "DM the keyword"]} value={action} onChange={setAction} /></Field>
    <Field label="Platform"><Chips options={["Instagram", "Facebook", "LinkedIn", "TikTok", "X"]} value={platform} onChange={setPlatform} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Generate engagement posts →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="version" onRefine={t.refine} /></div>
  </div>);
}

const MILESTONES = {
  "Just Listed": "Announce a brand-new listing now live. Build excitement and urgency, tease the best features, invite DMs/showings.",
  "Just Closed": "Celebrate a closed/sold deal. Warm, grateful, client-centered (no private details), subtle prompt that you'd love to help others.",
  "Offer Accepted": "Announce a property is under contract / offer accepted. Congratulate, note it moved fast, invite buyers to act quickly on the next one.",
  "New Listing": "A coming-soon / new-to-market teaser. Create anticipation before it's live, invite people to ask for a preview.",
};
function Milestone() {
  const [type, setType] = useState("Just Listed"); const [details, setDetails] = useState(""); const [platform, setPlatform] = useState("Instagram"); const t = useTool();
  const run = () => { if (!details.trim()) return t.setError("Add the property / deal details for the post.");
    t.generate("You are a real estate social media strategist creating '" + type + "' announcement posts for " + platform + ". " + MILESTONES[type] + " Match platform voice/length, scroll-stopping first line, tasteful line breaks, an emoji or two if on-brand, 4-7 relevant hashtags. Stay truthful, avoid fair-housing-risky language. Return 3 distinct versions separated by a line containing only ===.", "Milestone: " + type + "\nPlatform: " + platform + "\nDetails:\n" + details); };
  return (<div>
    <Field label="Template"><Chips options={Object.keys(MILESTONES)} value={type} onChange={setType} /></Field>

function DeadlineTracker() {
  const [accept, setAccept] = useState("");
  const [closing, setClosing] = useState("");
  const [addr, setAddr] = useState("");

  const addCalDays = (base, days) => { const d = new Date(base + "T00:00:00"); d.setDate(d.getDate() + days); return d; };
  const addBizDays = (base, days) => {
    const d = new Date(base + "T00:00:00"); let added = 0;
    while (added < days) { d.setDate(d.getDate() + 1); const dow = d.getDay(); if (dow !== 0 && dow !== 6) added++; }
    return d;
  };
  const fmt = (d) => d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });

  const milestones = accept ? (() => {
    const list = [
      { label: "Attorney Review ends", date: addBizDays(accept, 5), note: "Para 13 — 5 business days" },
      { label: "Inspection notice due", date: addBizDays(accept, 5), note: "Para 15 — typically 5 business days" },
      { label: "Homeowner insurance contingency", date: addBizDays(accept, 10), note: "Para 9 — 10 business days" },
      { label: "Financing approval (contingency date)", date: addCalDays(accept, 45), note: "Para 8 — 45 calendar days (or 5 biz days before closing, whichever earlier)" },
    ];
    if (closing) {
      const fiveBefore = addBizDays(closing, -5);
      list.push({ label: "Closing", date: new Date(closing + "T00:00:00"), note: "Para 5" });
      void fiveBefore;
    }
    return list.sort((a, b) => a.date - b.date);
  })() : [];

  const exportCal = () => {
    const items = milestones.map((m) => ({ date: ymd(m.date), noun: m.label, text: m.label + (addr ? (" — " + addr) : "") + "\n" + m.note }));
    downloadICS(items, "closeassist-deadlines.ics");
  };
  const copyText = () => {
    const L = ["TRANSACTION DEADLINES" + (addr ? " — " + addr : ""), accept ? ("Date of Acceptance: " + fmt(new Date(accept + "T00:00:00"))) : "", ""];
    milestones.forEach((m) => L.push(fmt(m.date) + " — " + m.label + "  (" + m.note + ")"));
    L.push(""); L.push("Estimate from standard Multi-Board 8.0 timelines — verify against the executed contract and any riders.");
    navigator.clipboard?.writeText(L.filter((x) => x !== undefined).join("\n"));
  };

  return (<div>
    <div style={{ background: "#fff", border: `1.5px solid ${C.line}`, borderLeft: `4px solid ${C.moss}`, borderRadius: 2, padding: "11px 14px", marginBottom: 18 }}>
      <p style={{ fontFamily: SAN, fontSize: 12.5, color: C.faint, lineHeight: 1.5, margin: 0 }}>Enter the date of acceptance and it maps the key Multi-Board 8.0 deadlines (attorney review, inspection, insurance, financing). Export them to your calendar with reminders. <b>Estimate — always verify against the executed contract.</b></p>
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      <div style={{ flex: "1 1 150px" }}><Field label="Date of Acceptance"><input type="date" style={inputStyle} value={accept} onChange={(e) => setAccept(e.target.value)} /></Field></div>
      <div style={{ flex: "1 1 150px" }}><Field label="Closing date (optional)"><input type="date" style={inputStyle} value={closing} onChange={(e) => setClosing(e.target.value)} /></Field></div>
    </div>
    <Field label="Property (optional)"><input style={inputStyle} value={addr} onChange={(e) => setAddr(e.target.value)} placeholder="123 Oak St" /></Field>

    {milestones.length > 0 && <div style={{ marginTop: 14, border: `2px solid ${C.ink}`, borderRadius: 5, overflow: "hidden" }}>
      <div style={{ background: C.ink, color: "#fff", padding: "10px 14px", fontFamily: SER, fontWeight: 700, fontSize: 16 }}>Key Deadlines</div>
      <div style={{ padding: 14 }}>
        {milestones.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", gap: 12, padding: "8px 0", borderBottom: i < milestones.length - 1 ? `1px solid ${C.line}` : "none" }}>
            <div><div style={{ fontFamily: SAN, fontSize: 13.5, fontWeight: 700, color: C.ink }}>{m.label}</div><div style={{ fontFamily: SAN, fontSize: 11.5, color: C.faint }}>{m.note}</div></div>
            <div style={{ fontFamily: SAN, fontSize: 13, fontWeight: 700, color: C.moss, whiteSpace: "nowrap" }}>{fmt(m.date)}</div>
          </div>
        ))}
      </div>
    </div>}

    {milestones.length > 0 && <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 16 }}>
      <button onClick={exportCal} style={{ fontFamily: SAN, fontSize: 13.5, fontWeight: 700, color: "#fff", background: C.moss, border: "none", borderRadius: 3, padding: "11px 18px", cursor: "pointer" }}>Add deadlines to calendar</button>
      <button onClick={copyText} style={{ fontFamily: SAN, fontSize: 13.5, fontWeight: 700, color: C.ink, background: "transparent", border: `1.5px solid ${C.ink}`, borderRadius: 3, padding: "11px 18px", cursor: "pointer" }}>Copy</button>
    </div>}
  </div>);
}

  const money = (n) => "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const price = num(f.price);

  // IL transfer tax formulas (defaults; editable). State $0.50 / $500, County $0.25 / $500.
  const stateStamp = has(f.transferState) ? num(f.transferState) : (price ? Math.ceil(price / 500) * 0.5 : 0);
  const countyStamp = has(f.transferCounty) ? num(f.transferCounty) : (price ? Math.ceil(price / 500) * 0.25 : 0);
  const cityStamp = num(f.transferCity); // city stamp varies wildly; only if entered/AI-filled

  const commission = has(f.commFlat) ? num(f.commFlat) : (price && has(f.commPct) ? price * num(f.commPct) / 100 : 0);

  // Tax proration: months of the year owed × (annual/12), agent enters months.
  const taxProration = (has(f.annualTax) && has(f.taxProrationMonths)) ? num(f.annualTax) / 12 * num(f.taxProrationMonths) : 0;

  const lineVals = {
    commission,
    attorney: num(f.attorney),
    title: num(f.title),
    stateStamp, countyStamp, cityStamp,
    recording: num(f.recording),
    settlement: num(f.settlement),
    survey: num(f.survey),
    taxProration,
    sellerCredit: num(f.sellerCredit),
    hoa: num(f.hoa),
    otherLiens: num(f.otherLiens),
    misc: num(f.misc),
  };
  const totalCosts = Object.values(lineVals).reduce((a, b) => a + b, 0);
  const loanPayoff = num(f.loanPayoff);
  const netToSeller = price - loanPayoff - totalCosts;

  const estimateWithAI = async () => {
    if (!price) return setErr("Enter a sale price first so the estimate has something to work from.");
    setBusy(true); setErr(""); setAiNote("");
    const sys = "You estimate typical SELLER-side closing costs for an Illinois residential sale. Return ONLY a JSON object, no prose, no markdown, with numeric dollar estimates (numbers only, no $ or commas) for these keys: title (owner's title insurance premium), recording (recording/deed fees), settlement (title company settlement/closing fee), survey (typical plat of survey cost), transferCity (municipal transfer stamp for the city given, 0 if the city has none or is unknown), misc (small buffer for misc charges). Base them on standard Illinois rates and the sale price. If a city is given and it has a known municipal transfer tax (e.g., Chicago), reflect it in transferCity; otherwise 0. Do not include state or county transfer tax (those are computed separately). Keep estimates realistic and conservative.";
    const user = "Sale price: $" + price + (has(f.city) ? ("\nCity: " + f.city) : "") + (has(f.county) ? ("\nCounty: " + f.county) : "") + "\nState: Illinois";
    try {
      const raw = await askClaude(sys, user);
      const clean = raw.replace(/```json|```/g, "").trim();
      const obj = JSON.parse(clean);
      setF((p) => ({
        ...p,
        title: p.title || (obj.title != null ? String(Math.round(obj.title)) : p.title),
        recording: p.recording || (obj.recording != null ? String(Math.round(obj.recording)) : p.recording),
        settlement: p.settlement || (obj.settlement != null ? String(Math.round(obj.settlement)) : p.settlement),
        survey: p.survey || (obj.survey != null ? String(Math.round(obj.survey)) : p.survey),
        transferCity: p.transferCity || (obj.transferCity != null ? String(Math.round(obj.transferCity)) : p.transferCity),
        misc: p.misc || (obj.misc != null ? String(Math.round(obj.misc)) : p.misc),
      }));
      setAiNote("Estimated the blank back-end lines. Review and override any that look off, then confirm with your title company.");
    } catch (e) {
      setErr("Couldn't parse the estimate. Try again, or enter the back-end numbers manually.");
    } finally { setBusy(false); }
  };

  const brokerName = has(f.brokerage) ? f.brokerage.trim() : "[Your Brokerage]";

  const buildText = () => {
    const L = [];
    L.push(brokerName.toUpperCase());
    L.push("Estimated Seller Net Sheet");
    L.push("(Estimate only — confirm all figures with your title company.)");
    L.push("");
    if (has(f.address)) L.push("Property: " + f.address);
    if (has(f.city) || has(f.county)) L.push([f.city, f.county && (f.county + " County"), "IL"].filter(Boolean).join(", "));
    L.push("");
    L.push("Sale Price: " + money(price));
    L.push("");
    L.push("LESS CLOSING COSTS:");
    const add = (label, v) => { if (v) L.push("  " + label + ": " + money(v)); };
    add("Loan Payoff", loanPayoff);
    add("Real Estate Commission" + (has(f.commPct) && !has(f.commFlat) ? " (" + num(f.commPct) + "%)" : ""), commission);
    add("Attorney Fee", lineVals.attorney);
    add("Owner's Title Insurance", lineVals.title);
    add("State Transfer Tax", stateStamp);
    add("County Transfer Tax", countyStamp);
    add("City/Municipal Transfer Tax", cityStamp);
    add("Recording Fees", lineVals.recording);
    add("Settlement / Closing Fee", lineVals.settlement);
    add("Survey", lineVals.survey);
    add("Property Tax Proration" + (has(f.taxProrationMonths) ? " (" + num(f.taxProrationMonths) + " mo)" : ""), taxProration);
    add("Seller Credit to Buyer", lineVals.sellerCredit);
    add("HOA / Association Dues", lineVals.hoa);
    add("Other Liens / Judgments", lineVals.otherLiens);
    add("Miscellaneous", lineVals.misc);
    L.push("");
    L.push("Total Costs + Payoff: " + money(totalCosts + loanPayoff));
    L.push("ESTIMATED NET TO SELLER: " + money(netToSeller));
    L.push("");
    L.push("Prepared by " + brokerName + " — estimate only, not a closing disclosure.");
    return L.join("\n");
  };

  const copy = async () => { try { await navigator.clipboard.writeText(buildText()); setCopied(true); setTimeout(() => setCopied(false), 1600); } catch {} };
  const email = () => { window.location.href = "mailto:?subject=" + encodeURIComponent("Estimated Seller Net Sheet — " + (f.address || "")) + "&body=" + encodeURIComponent(buildText()); };

  const half = { flex: "1 1 150px" };
  const fld = (label, key, ph) => <div style={half}><Field label={label}><input style={inputStyle} value={f[key]} onChange={(e) => set(key, e.target.value)} placeholder={ph} /></Field></div>;
  const row = (label, v, bold, neg) => (v || v === 0) ? <div style={{ display: "flex", justifyContent: "space-between", gap: 12, padding: "5px 0", borderBottom: `1px solid ${C.line}` }}><span style={{ fontFamily: SAN, fontSize: 13, color: C.ink, fontWeight: bold ? 700 : 400 }}>{label}</span><span style={{ fontFamily: SAN, fontSize: 13, color: bold ? C.ink : C.faint, fontWeight: bold ? 700 : 600 }}>{neg && v ? "−" : ""}{money(v)}</span></div> : null;

  return (<div>
    <div style={{ background: "#fff", border: `1.5px solid ${C.line}`, borderLeft: `4px solid ${C.moss}`, borderRadius: 2, padding: "11px 14px", marginBottom: 18 }}>
      <p style={{ fontFamily: SAN, fontSize: 12.5, color: C.faint, lineHeight: 1.5, margin: 0 }}>Illinois seller net sheet. You enter the deal numbers; tap <b>Estimate with AI</b> to fill typical title/recording/settlement costs, then override anything. State & county transfer taxes auto-calculate. Every line is editable. <b>Estimate only — confirm with your title company.</b></p>
    </div>

    <Field label="Your brokerage (shown on the sheet)"><input style={inputStyle} value={f.brokerage} onChange={(e) => set("brokerage", e.target.value)} placeholder="e.g. Smart Home Realty" /></Field>
    <Field label="Property address"><input style={inputStyle} value={f.address} onChange={(e) => set("address", e.target.value)} placeholder="9911 S Peoria St" /></Field>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("City", "city", "Chicago")}
      {fld("County", "county", "Cook")}
    </div>

    <div style={{ fontFamily: SAN, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2, color: C.moss, margin: "16px 0 8px" }}>Deal numbers (you enter)</div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("Sale Price", "price", "$300,000")}
      {fld("Loan Payoff", "loanPayoff", "$185,000")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("Commission %", "commPct", "6")}
      {fld("…or flat commission $", "commFlat", "leave blank to use %")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("Annual Property Tax", "annualTax", "$6,000")}
      {fld("Tax proration (months owed)", "taxProrationMonths", "e.g. 6")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("Attorney Fee", "attorney", "$750")}
      {fld("Seller Credit to Buyer", "sellerCredit", "$0")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("HOA / Association Dues", "hoa", "$0")}
      {fld("Other Liens / Judgments", "otherLiens", "$0")}
    </div>

    <div style={{ fontFamily: SAN, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2, color: C.moss, margin: "18px 0 8px", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
      Back-end costs (AI estimates — override anytime)
      <button onClick={estimateWithAI} disabled={busy} style={{ fontFamily: SAN, fontSize: 12, fontWeight: 700, color: "#fff", background: busy ? C.faint : C.moss, border: "none", borderRadius: 3, padding: "7px 13px", cursor: busy ? "default" : "pointer", textTransform: "none", letterSpacing: 0 }}>{busy ? "Estimating…" : "Estimate with AI"}</button>
    </div>
    {aiNote && <p style={{ fontFamily: SAN, fontSize: 12, color: C.moss, marginTop: 0 }}>{aiNote}</p>}
    {err && <p style={{ fontFamily: SAN, fontSize: 12.5, color: C.amberDeep, marginTop: 0 }}>{err}</p>}
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("Owner's Title Insurance", "title", "AI / enter")}
      {fld("Settlement / Closing Fee", "settlement", "AI / enter")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("Recording Fees", "recording", "AI / enter")}
      {fld("Survey", "survey", "AI / enter")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("City/Municipal Transfer Tax", "transferCity", "AI / enter (0 if none)")}
      {fld("Miscellaneous", "misc", "AI / enter")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {fld("State Transfer Tax (auto)", "transferState", "auto from price")}
      {fld("County Transfer Tax (auto)", "transferCounty", "auto from price")}
    </div>

    <div style={{ marginTop: 20, border: `2px solid ${C.ink}`, borderRadius: 5, overflow: "hidden" }}>
      <div style={{ background: C.ink, color: "#fff", padding: "12px 16px", textAlign: "center" }}>
        <div style={{ fontFamily: SER, fontWeight: 700, fontSize: 19 }}>{brokerName}</div>
        <div style={{ fontFamily: SAN, fontSize: 13, fontWeight: 600 }}>Estimated Seller Net Sheet</div>
      </div>
      <div style={{ padding: 16 }}>
        {row("Sale Price", price, true)}
        {row("Loan Payoff", loanPayoff, false, true)}
        {row("Real Estate Commission", commission, false, true)}
        {row("Attorney Fee", lineVals.attorney, false, true)}
        {row("Owner's Title Insurance", lineVals.title, false, true)}
        {row("State Transfer Tax", stateStamp, false, true)}
        {row("County Transfer Tax", countyStamp, false, true)}
        {row("City/Municipal Transfer Tax", cityStamp, false, true)}
        {row("Recording Fees", lineVals.recording, false, true)}
        {row("Settlement / Closing Fee", lineVals.settlement, false, true)}
        {row("Survey", lineVals.survey, false, true)}
        {row("Property Tax Proration", taxProration, false, true)}
        {row("Seller Credit to Buyer", lineVals.sellerCredit, false, true)}
        {row("HOA / Association Dues", lineVals.hoa, false, true)}
        {row("Other Liens / Judgments", lineVals.otherLiens, false, true)}
        {row("Miscellaneous", lineVals.misc, false, true)}
        <div style={{ marginTop: 8 }}>{row("Estimated Net to Seller", netToSeller, true)}</div>
        <div style={{ marginTop: 12, textAlign: "center", fontFamily: SAN, fontSize: 11.5, color: C.faint, lineHeight: 1.5 }}>Estimate only — confirm all figures with your title company. Not a closing disclosure.</div>
      </div>
    </div>

    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 16 }}>
      <button onClick={copy} style={{ fontFamily: SAN, fontSize: 13.5, fontWeight: 700, color: copied ? "#fff" : C.ink, background: copied ? C.moss : "transparent", border: `1.5px solid ${copied ? C.moss : C.ink}`, borderRadius: 3, padding: "11px 18px", cursor: "pointer" }}>{copied ? "Copied ✓" : "Copy net sheet"}</button>
      <button onClick={email} style={{ fontFamily: SAN, fontSize: 13.5, fontWeight: 700, color: C.ink, background: "transparent", border: `1.5px solid ${C.ink}`, borderRadius: 3, padding: "11px 18px", cursor: "pointer" }}>Email it</button>
    </div>
  </div>);
}

function CommissionStatement() {
  const { profile } = useContext(ProfileCtx);
  const [f, setF] = useState({
    brokerage: "", address: "", listingBroker: "", buyerBroker: "",
    price: "", pct: "", buyerBrokerComm: "",
    adminFeeBuyer: "", commPaidBySeller: "", commDueBuyingBroker: "",
    feeToSellersAgent: "", officeAdmissionFee: "",
  });
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const [copied, setCopied] = useState(false);

  const num = (v) => { const n = Number(String(v).replace(/[^0-9.]/g, "")); return isFinite(n) ? n : 0; };
  const has = (v) => String(v).trim() !== "";
  const money = (n) => "$" + n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 2 });

  // Auto-calc where possible, but let a typed value override.
  const calcBuyerBroker = has(f.buyerBrokerComm) ? num(f.buyerBrokerComm) : (has(f.price) && has(f.pct) ? num(f.price) * num(f.pct) / 100 : 0);
  const commDue = has(f.commDueBuyingBroker) ? num(f.commDueBuyingBroker) : (has(f.commPaidBySeller) ? num(f.commPaidBySeller) : calcBuyerBroker);
  const netToBuyingBroker = commDue - num(f.feeToSellersAgent);
  const totalDueFromBuyer = num(f.adminFeeBuyer) + num(f.officeAdmissionFee);

  const brandSuggest = (profile && (profile.brokerage || profile.team || profile.name)) || "";
  const brokerName = (f.brokerage && f.brokerage.trim()) ? f.brokerage.trim() : (brandSuggest || "[Your Brokerage]");

  const line = (label, val) => has(val) || val === 0 ? label + ": " + (typeof val === "number" ? money(val) : val) : null;

  const buildText = () => {
    const L = [];
    L.push(brokerName.toUpperCase());
    L.push("Commission Statement");
    L.push("");
    if (has(f.address)) L.push("Property Address: " + f.address);
    if (has(f.listingBroker)) L.push("Listing Broker: " + f.listingBroker);
    if (has(f.buyerBroker)) L.push("Buyer Broker: " + f.buyerBroker);
    L.push("");
    if (has(f.price)) L.push("Purchase Price: " + money(num(f.price)));
    if (has(f.pct)) L.push("Percentage: " + num(f.pct) + "%");
    if (calcBuyerBroker) L.push("Buyer Broker: " + money(calcBuyerBroker));
    if (has(f.adminFeeBuyer)) L.push("Administrative Transaction Fee Charged to Buyer: " + money(num(f.adminFeeBuyer)));
    if (has(f.commPaidBySeller)) L.push("Commission Paid by Seller: " + money(num(f.commPaidBySeller)));
    if (commDue) L.push("Commission Due to Buying Broker: " + money(commDue));
    if (has(f.feeToSellersAgent)) L.push("Fee to Seller's Agent (deducted from commission): " + money(num(f.feeToSellersAgent)));
    if (commDue) L.push("Net Commission to Buying Broker: " + money(netToBuyingBroker));
    if (has(f.officeAdmissionFee)) L.push("Broker Office Admission Fee Charged to Buyer: " + money(num(f.officeAdmissionFee)));
    L.push("Total Due from Buyer to Buying Broker: " + money(totalDueFromBuyer));
    L.push("");
    L.push("INSTRUCTIONS FOR SETTLEMENT AGENT — Payable to:");
    if (netToBuyingBroker) L.push("  " + (f.buyerBroker || brokerName) + " (Buying Broker) — net commission paid by SELLER to the buying broker: " + money(netToBuyingBroker));
    if (has(f.feeToSellersAgent)) L.push("  " + (f.listingBroker || "Seller's Agent") + " (Seller's Agent) — fee deducted from buying broker's commission: " + money(num(f.feeToSellersAgent)));
    if (has(f.officeAdmissionFee)) L.push("  " + (f.buyerBroker || brokerName) + " (Broker Office Admission Fee) — please issue a check for the broker office admission fee: " + money(num(f.officeAdmissionFee)));
    L.push("Total Due from Buyer to Buying Broker: " + money(totalDueFromBuyer));
    L.push("");
    L.push("Prepared by " + brokerName);
    return L.join("\n");
  };

  const copy = async () => { try { await navigator.clipboard.writeText(buildText()); setCopied(true); setTimeout(() => setCopied(false), 1600); } catch {} };
  const email = () => { window.location.href = "mailto:?subject=" + encodeURIComponent("Commission Statement — " + (f.address || "")) + "&body=" + encodeURIComponent(buildText()); };
  const csv = () => {
    const rows = [["Field", "Value"],
      ["Property Address", f.address], ["Listing Broker", f.listingBroker], ["Buyer Broker", f.buyerBroker],
      ["Purchase Price", has(f.price) ? money(num(f.price)) : ""], ["Percentage", has(f.pct) ? num(f.pct) + "%" : ""],
      ["Buyer Broker Commission", calcBuyerBroker ? money(calcBuyerBroker) : ""],
      ["Admin Transaction Fee (Buyer)", has(f.adminFeeBuyer) ? money(num(f.adminFeeBuyer)) : ""],
      ["Commission Paid by Seller", has(f.commPaidBySeller) ? money(num(f.commPaidBySeller)) : ""],
      ["Commission Due to Buying Broker", commDue ? money(commDue) : ""],
      ["Fee to Seller's Agent", has(f.feeToSellersAgent) ? money(num(f.feeToSellersAgent)) : ""],
      ["Net Commission to Buying Broker", commDue ? money(netToBuyingBroker) : ""],
      ["Broker Office Admission Fee (Buyer)", has(f.officeAdmissionFee) ? money(num(f.officeAdmissionFee)) : ""],
      ["Total Due from Buyer to Buying Broker", money(totalDueFromBuyer)],
      ["Prepared by", brokerName]];
    const esc = (v) => '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"';
    const blob = new Blob([rows.map((r) => r.map(esc).join(",")).join("\n")], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    const slug = (f.address || "commission").replace(/[^a-z0-9]+/gi, "-").replace(/^-+|-+$/g, "").slice(0, 40) || "commission";
    a.href = url; a.download = "commission-" + slug + ".csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const half = { flex: "1 1 150px" };
  const moneyInput = (label, key, ph) => <div style={half}><Field label={label}><input style={inputStyle} value={f[key]} onChange={(e) => set(key, e.target.value)} placeholder={ph} /></Field></div>;
  const row = (label, val, bold) => <div style={{ display: "flex", justifyContent: "space-between", gap: 12, padding: "5px 0", borderBottom: `1px solid ${C.line}` }}><span style={{ fontFamily: SAN, fontSize: 13.5, color: C.ink, fontWeight: bold ? 700 : 400 }}>{label}</span><span style={{ fontFamily: SAN, fontSize: 13.5, color: C.ink, fontWeight: bold ? 700 : 600 }}>{val}</span></div>;

  return (<div>
    <div style={{ background: "#fff", border: `1.5px solid ${C.line}`, borderLeft: `4px solid ${C.moss}`, borderRadius: 2, padding: "11px 14px", marginBottom: 18 }}>
      <p style={{ fontFamily: SAN, fontSize: 12.5, color: C.faint, lineHeight: 1.5, margin: 0 }}>Fill in whatever applies — leave the rest blank. Buyer Broker, Net Commission, and the totals calculate automatically. "Prepared by" uses your Brand brokerage.</p>
    </div>

    <Field label="Your brokerage (shown on the statement)"><input style={inputStyle} value={f.brokerage} onChange={(e) => set("brokerage", e.target.value)} placeholder={brandSuggest || "e.g. Smart Home Realty"} /></Field>
    <Field label="Property address"><input style={inputStyle} value={f.address} onChange={(e) => set("address", e.target.value)} placeholder="9911 S Peoria St, Chicago IL 60643" /></Field>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {moneyInput("Listing Broker", "listingBroker", "Real People Realty")}
      {moneyInput("Buyer Broker", "buyerBroker", "Smart Home Realty")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {moneyInput("Purchase Price", "price", "$160,000")}
      {moneyInput("Percentage (%)", "pct", "2.5")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {moneyInput("Buyer Broker $ (auto if blank)", "buyerBrokerComm", "leave blank to auto-calc")}
      {moneyInput("Admin Transaction Fee (Buyer)", "adminFeeBuyer", "$500")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {moneyInput("Commission Paid by Seller", "commPaidBySeller", "$4,000")}
      {moneyInput("Commission Due to Buying Broker", "commDueBuyingBroker", "auto if blank")}
    </div>
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {moneyInput("Fee to Seller's Agent", "feeToSellersAgent", "$299")}
      {moneyInput("Broker Office Admission Fee (Buyer)", "officeAdmissionFee", "$500")}
    </div>

    <div style={{ marginTop: 20, border: `2px solid ${C.ink}`, borderRadius: 5, overflow: "hidden" }}>
      <div style={{ background: C.ink, color: "#fff", padding: "12px 16px", textAlign: "center" }}>
        <div style={{ fontFamily: SER, fontWeight: 700, fontSize: 20, letterSpacing: 0.5 }}>{brokerName}</div>
        <div style={{ fontFamily: SAN, fontSize: 13, fontWeight: 600 }}>Commission Statement</div>
      </div>
      <div style={{ padding: 16 }}>
        {(has(f.address) || has(f.listingBroker) || has(f.buyerBroker)) && <div style={{ marginBottom: 12, fontFamily: SAN, fontSize: 13, color: C.ink, lineHeight: 1.7 }}>
          {has(f.address) && <div><b>Property Address:</b> {f.address}</div>}
          {has(f.listingBroker) && <div><b>Listing Broker:</b> {f.listingBroker}</div>}
          {has(f.buyerBroker) && <div><b>Buyer Broker:</b> {f.buyerBroker}</div>}
        </div>}
        {has(f.price) && row("Purchase Price", money(num(f.price)))}
        {has(f.pct) && row("Percentage", num(f.pct) + "%")}
        {!!calcBuyerBroker && row("Buyer Broker", money(calcBuyerBroker))}
        {has(f.adminFeeBuyer) && row("Administrative Transaction Fee Charged to Buyer", money(num(f.adminFeeBuyer)))}
        {has(f.commPaidBySeller) && row("Commission Paid by Seller", money(num(f.commPaidBySeller)), true)}
        {!!commDue && row("Commission Due to Buying Broker", money(commDue), true)}
        {has(f.feeToSellersAgent) && row("Fee to Seller's Agent (deducted from commission)", money(num(f.feeToSellersAgent)))}
        {!!commDue && row("Net Commission to Buying Broker", money(netToBuyingBroker), true)}

const ROSTER = {
  "1 buyer": [["Buyer", "b1"]],
  "2 buyers": [["Buyer 1", "b1"], ["Buyer 2", "b2"]],
  "Buyer + seller": [["Buyer", "b1"], ["Seller", "s1"]],
  "2 buyers + 2 sellers": [["Buyer 1", "b1"], ["Buyer 2", "b2"], ["Seller 1", "s1"], ["Seller 2", "s2"]],
};
function anchorInstruction(anchors, signers) {
  const roster = ROSTER[signers];
  if (anchors === "DocuSign anchor tags") {
    const routing = roster.map((r, i) => "Recipient " + (i + 1) + " = " + r[0] + " (tokens \\" + r[1] + "_sig\\, \\" + r[1] + "_date\\, \\" + r[1] + "_init\\)").join("; ");
    return "END THE DOCUMENT with a signature section formatted for DocuSign auto-place (anchor text), following these rules EXACTLY: (1) First print a line 'DOCUSIGN ROUTING KEY — add recipients in this order: " + routing + "'. (2) Then for each signer, a labeled block. Put each anchor token ON ITS OWN LINE, with the human label on the line directly above it, and ONE blank line between each token so placed fields never overlap. (3) Use these EXACT tokens, each appearing ONCE only — for " + roster.map((r) => r[0] + ": \\" + r[1] + "_sig\\ (signature), \\" + r[1] + "_date\\ (date signed), \\" + r[1] + "_init\\ (initials)").join("; ") + ". (4) Tokens must be plain text, backslash-delimited, no spaces inside, and must not appear anywhere else in the document. Do not add tokens for signers not listed.";
  }
  return "End with clearly labeled blank lines for each signer (" + roster.map((r) => r[0]).join(", ") + "), each with a signature line, a date line, and an initials line.";
}

function dealToText(deal, side) {
  const L = [];
  L.push("DEAL SHEET — via CloseAssist");
  L.push("Side: " + side);
  L.push("");
  if (deal.buyers) L.push("Buyer(s): " + deal.buyers);
  if (deal.sellers) L.push("Seller(s): " + deal.sellers);
  L.push("Property: " + (deal.address || "[none]"));
  if (deal.mls) L.push("MLS #: " + deal.mls);
  if (deal.list) L.push("List price: " + deal.list);
  L.push("Offer price: " + (deal.offer || "[none]"));
  if (deal.earnest) L.push("Earnest money: " + deal.earnest + " (due " + deal.earnestDays + " business days after acceptance)");
  if (deal.credit) L.push("Seller credit at closing: " + deal.credit);
  if (deal.buyerComp) L.push("Seller pays buyer-broker comp (Para 4): " + deal.buyerComp);
  L.push("Financing: " + deal.financing);
  if (deal.close) L.push("Closing date: " + deal.close);
  L.push("Possession: " + deal.possession);
  L.push("Inspection election (Para 15): " + deal.inspection);
  L.push("Appraisal Addendum: " + deal.apprAddendum);
  L.push("Home-sale contingency (Para 31): " + deal.homeSale);
  if (deal.extra) L.push("Other terms: " + deal.extra);
  return L.join("\n");
}

function dealToCSV(deal, side) {
  const rows = [
    ["Field", "Value"],
    ["Side", side],
    ["Buyers", deal.buyers],
    ["Sellers", deal.sellers],
    ["Property", deal.address],
    ["MLS #", deal.mls],
    ["List price", deal.list],
    ["Offer price", deal.offer],
    ["Earnest money", deal.earnest],
    ["EM due (biz days)", deal.earnestDays],
    ["Seller credit", deal.credit],
    ["Seller pays buyer comp (Para 4)", deal.buyerComp],
    ["Financing", deal.financing],
    ["Closing date", deal.close],
    ["Possession", deal.possession],
    ["Inspection election (Para 15)", deal.inspection],
    ["Appraisal Addendum", deal.apprAddendum],
    ["Home-sale contingency (Para 31)", deal.homeSale],
    ["Other terms", deal.extra],
  ];
  const esc = (v) => '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"';
  return rows.map((r) => r.map(esc).join(",")).join("\n");
}

function CopyDealData({ deal, side }) {
  const [copied, setCopied] = useState(false);
  const btn = (active) => ({ fontFamily: SAN, fontSize: 13.5, fontWeight: 700, color: active ? "#fff" : C.ink, background: active ? C.moss : "transparent", border: `1.5px solid ${active ? C.moss : C.ink}`, borderRadius: 3, padding: "11px 16px", cursor: "pointer" });

  const copy = async () => {
    const text = dealToText(deal, side);
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) await navigator.clipboard.writeText(text);
      else { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
      setCopied(true); setTimeout(() => setCopied(false), 1800);
    } catch { setCopied(false); }
  };

  const downloadCSV = () => {
    const csv = dealToCSV(deal, side);
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const slug = (deal.address || "deal").replace(/[^a-z0-9]+/gi, "-").replace(/^-+|-+$/g, "").slice(0, 40) || "deal";
    a.href = url; a.download = "closeassist-" + slug + ".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const email = () => {
    const subject = "Deal: " + (deal.address || "New offer");
    const body = dealToText(deal, side);
    window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
  };

  return (<>
    <button onClick={copy} style={btn(copied)}>{copied ? "Copied ✓" : "Copy deal data"}</button>
    <button onClick={downloadCSV} style={btn(false)}>Download CSV</button>
    <button onClick={email} style={btn(false)}>Email it</button>
  </>);
}

  }, [side, deal.buyers, deal.sellers]);

  const loadStages = async () => {
    setErr(""); setBusy(true);

      const r = await fubCall({ action: "stages" });

        phone: phone.trim() || undefined,
        stageId: Number(stageId),

        propertyAddress: deal.address || undefined,

        <button onClick={() => setOpen(false)} style={{ fontFamily: SAN, fontSize: 12, color: C.faint, background: "none", border: "none", cursor: "pointer" }}>close ✕</button>
      </div>
      <p style={{ fontFamily: SAN, fontSize: 12, color: C.faint, lineHeight: 1.5, marginTop: 0, marginBottom: 14 }}>Creates a contact + deal in your FUB pipeline. The deal triggers your FUB→dotloop integration to open the loop on your template.</p>

      <Field label="Contact name"><input style={inputStyle} value={contactName} onChange={(e) => setContactName(e.target.value)} placeholder="Client name" /></Field>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>

        <div style={{ flex: "1 1 130px" }}><Field label="Phone"><input style={inputStyle} value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="555-123-4567" /></Field></div>
      </div>

      <Field label="Deal stage">
        {stages === null ? (
          <div style={{ fontFamily: SAN, fontSize: 13, color: C.faint, padding: "8px 0" }}>{busy ? "Loading your pipeline…" : "—"}</div>
        ) : stages.length === 0 ? (

const PDFJS_SRC = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
const PDFJS_WORKER = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
function loadPdfjs() {
  return new Promise((resolve, reject) => {
    if (typeof window !== "undefined" && window.pdfjsLib) return resolve(window.pdfjsLib);
    const s = document.createElement("script");
    s.src = PDFJS_SRC;
    s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; resolve(window.pdfjsLib); };
    s.onerror = () => reject(new Error("Couldn't load the PDF reader."));
    document.head.appendChild(s);
  });
}
async function extractPdf(file) {
  const pdfjsLib = await loadPdfjs();
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    text += c.items.map((i) => i.str).join(" ") + "\n";
  }
  return text.trim();
}

function pad2(n) { return n < 10 ? "0" + n : "" + n; }
function ymd(d) { return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function icsDate(dateStr) { return dateStr.replace(/-/g, ""); } // all-day YYYYMMDD
function icsEscape(s) { return String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n"); }

function buildICS(items) {
  // items: [{ text, noun, date 'YYYY-MM-DD' }]
  const now = new Date();
  const stamp = now.getUTCFullYear() + pad2(now.getUTCMonth() + 1) + pad2(now.getUTCDate()) + "T" + pad2(now.getUTCHours()) + pad2(now.getUTCMinutes()) + pad2(now.getUTCSeconds()) + "Z";
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//CloseAssist//Content Calendar//EN", "CALSCALE:GREGORIAN"];
  items.forEach((it, i) => {
    if (!it.date) return;
    const start = icsDate(it.date);
    const d = new Date(it.date + "T00:00:00"); d.setDate(d.getDate() + 1);
    const end = ymd(d).replace(/-/g, "");
    const title = (it.noun ? ("Post: " + it.noun) : "CloseAssist post");
    const firstLine = String(it.text || "").split("\n")[0].slice(0, 60);
    lines.push("BEGIN:VEVENT");
    lines.push("UID:closeassist-" + Date.now() + "-" + i + "@closeassist");
    lines.push("DTSTAMP:" + stamp);
    lines.push("DTSTART;VALUE=DATE:" + start);
    lines.push("DTEND;VALUE=DATE:" + end);
    lines.push("SUMMARY:" + icsEscape(title + (firstLine ? (" — " + firstLine) : "")));
    lines.push("DESCRIPTION:" + icsEscape(it.text));
    lines.push("BEGIN:VALARM");
    lines.push("TRIGGER:-PT2H");
    lines.push("ACTION:DISPLAY");
    lines.push("DESCRIPTION:" + icsEscape("Time to post: " + title));
    lines.push("END:VALARM");
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}

function downloadICS(items, filename) {
  const ics = buildICS(items);
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename || "closeassist-calendar.ics";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function SavedDrawer({ open, onClose }) {

  const [view, setView] = useState("list");
  const [copiedAll, setCopiedAll] = useState(false);
