<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CloseAssist</title>
<style>html,body{margin:0;background:#f4ede1}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
// Persist settings in localStorage on your own site (Claude artifact storage isn't here).
if (!window.storage) {
  window.storage = {
    get: async (k) => { const v = localStorage.getItem(k); return v == null ? null : { key: k, value: v }; },
    set: async (k, val) => { localStorage.setItem(k, val); return { key: k, value: val }; },
    delete: async (k) => { localStorage.removeItem(k); return { key: k, deleted: true }; },
    list: async (prefix) => ({ keys: Object.keys(localStorage).filter(x => !prefix || x.startsWith(prefix)) }),
  };
}
const { useState, useRef, useEffect, useContext, createContext } = React;


// ─────────────────────────────────────────────────────────────
// CloseAssist — an AI sales toolkit for real estate agents.
// 17 tools across Outreach, Social Content, and Listings/Appointments.
// A shared Brand profile flows into everything; results can be
// refined in place, saved, spread across a week, and copied in bulk.
// ─────────────────────────────────────────────────────────────

const FONTS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,0,700;9..144,1,400;9..144,1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
`;

const C = { ink: "#1c1815", cream: "#f4ede1", paper: "#fbf7ef", amber: "#c2581f", amberDeep: "#9c4316", moss: "#3d4a3a", line: "#d8cdba", faint: "#8a7d6a" };
const SAN = "'Hanken Grotesk', sans-serif";
const SER = "'Fraunces', serif";
const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

const SavedCtx = createContext({ saved: [], add: () => {}, remove: () => {}, update: () => {} });
const ProfileCtx = createContext({ profile: {}, setProfile: () => {} });

// Backend connection (your deployed Vercel server). Set once in the Backend drawer.
const BACKEND = { url: "", key: "" };

async function askClaude(system, user) {
  if (!BACKEND.url) throw new Error("Connect your backend first (tap ⚡ Backend, paste your /api/generate URL).");
  const res = await fetch(BACKEND.url, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-app-key": BACKEND.key },
    body: JSON.stringify({ system, user, max_tokens: 1600 }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ("Request failed (" + res.status + ")"));
  return (data.text || "").trim();
}

function toCards(text) {
  const parts = text.split(/\n?===+\n?/).map((s) => s.trim()).filter(Boolean);
  return parts.length ? parts : [text];
}

function brandContext(p) {
  const bits = [];
  if (p.name) bits.push("Agent name: " + p.name);
  if (p.team) bits.push("Team: " + p.team);
  if (p.brokerage) bits.push("Brokerage: " + p.brokerage);
  if (p.phone) bits.push("Contact: " + p.phone);
  if (p.area) bits.push("Primary market/area: " + p.area);
  if (!bits.length) return "";
  return "\n\nAGENT BRANDING — weave these in naturally where appropriate (sign-offs, CTAs, post footers, signatures). Never invent contact details beyond what's listed: " + bits.join("; ") + ".";
}

function useTool() {
  const { profile } = useContext(ProfileCtx);
  const [cards, setCards] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const sysRef = useRef("");

  const generate = async (system, user) => {
    const full = system + brandContext(profile);
    setLoading(true); setError(""); setCards(null); sysRef.current = full;
    try { setCards(toCards(await askClaude(full, user))); }
    catch (e) { setError(e.message || "Something went wrong."); }
    finally { setLoading(false); }
  };

  const refine = async (i, instruction) => {
    const original = cards[i];
    const u = "Here is a draft you wrote:\n\n" + original + "\n\nRevise it based on this instruction: " + instruction + "\n\nReturn ONLY the revised version — no commentary.";
    const out = await askClaude(sysRef.current, u);
    setCards((cs) => cs.map((c, idx) => (idx === i ? out.trim() : c)));
  };

  return { cards, error, loading, generate, refine, setError };
}

const miniBtn = (color) => ({ fontFamily: SAN, fontSize: 12, fontWeight: 600, letterSpacing: 0.3, color, background: "transparent", border: "none", cursor: "pointer", padding: 0 });

function CopyBtn({ text }) {
  const [done, setDone] = useState(false);
  return <button onClick={() => { navigator.clipboard?.writeText(text); setDone(true); setTimeout(() => setDone(false), 1400); }} style={miniBtn(done ? C.moss : C.amber)}>{done ? "copied ✓" : "copy"}</button>;
}

function Field({ label, children }) {
  return (
    <label style={{ display: "block", marginBottom: 16 }}>
      <span style={{ display: "block", fontFamily: SAN, fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.faint, marginBottom: 6 }}>{label}</span>
      {children}
    </label>
  );
}

const inputStyle = { width: "100%", boxSizing: "border-box", fontFamily: SAN, fontSize: 15, color: C.ink, background: C.paper, border: `1.5px solid ${C.line}`, borderRadius: 2, padding: "11px 13px", outline: "none", resize: "vertical" };

function Chips({ options, value, onChange }) {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
      {options.map((o) => {
        const on = o === value;
        return <button key={o} onClick={() => onChange(o)} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 600, padding: "7px 13px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${on ? C.ink : C.line}`, background: on ? C.ink : "transparent", color: on ? C.cream : C.faint }}>{o}</button>;
      })}
    </div>
  );
}

function RunButton({ onClick, loading, children }) {
  return <button onClick={onClick} disabled={loading} style={{ fontFamily: SAN, fontSize: 15, fontWeight: 700, letterSpacing: 0.4, color: C.cream, background: loading ? C.faint : C.amber, border: "none", borderRadius: 2, padding: "13px 26px", cursor: loading ? "default" : "pointer", boxShadow: loading ? "none" : `4px 4px 0 ${C.ink}` }}>{loading ? "thinking…" : children}</button>;
}

function Card({ text, index, noun, onRefine }) {
  const { add } = useContext(SavedCtx);
  const [saved, setSaved] = useState(false);
  const [open, setOpen] = useState(false);
  const [instr, setInstr] = useState("");
  const [busy, setBusy] = useState(false);
  const doSave = () => { add({ text, noun }); setSaved(true); setTimeout(() => setSaved(false), 1400); };
  const doRefine = async () => { if (!instr.trim()) return; setBusy(true); try { await onRefine(index, instr); setInstr(""); setOpen(false); } finally { setBusy(false); } };
  return (
    <div style={{ background: C.paper, border: `1.5px solid ${C.line}`, borderLeft: `4px solid ${C.amber}`, borderRadius: 2, padding: "16px 18px", animation: `rise .4s ${index * 0.06}s both` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontFamily: SER, fontStyle: "italic", fontSize: 14, color: C.faint }}>{noun} {index + 1}</span>
        <div style={{ display: "flex", gap: 14 }}>
          <CopyBtn text={text} />
          <button onClick={doSave} style={miniBtn(saved ? C.moss : C.faint)}>{saved ? "saved ★" : "save ☆"}</button>
          <button onClick={() => setOpen((o) => !o)} style={miniBtn(open ? C.amberDeep : C.faint)}>refine</button>
        </div>
      </div>
      <p style={{ fontFamily: SAN, fontSize: 15, lineHeight: 1.55, color: C.ink, whiteSpace: "pre-wrap", margin: 0 }}>{busy ? "reworking…" : text}</p>
      {open && (
        <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
          <input style={{ ...inputStyle, flex: 1, minWidth: 200, fontSize: 14 }} value={instr} onChange={(e) => setInstr(e.target.value)} placeholder="e.g. shorter, warmer, add the price, drop the emoji…" onKeyDown={(e) => e.key === "Enter" && doRefine()} />
          <button onClick={doRefine} disabled={busy} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 700, color: C.cream, background: busy ? C.faint : C.ink, border: "none", borderRadius: 2, padding: "0 16px", cursor: busy ? "default" : "pointer" }}>{busy ? "…" : "regenerate"}</button>
        </div>
      )}
    </div>
  );
}

function Results({ cards, error, noun = "option", onRefine }) {
  if (error) return <p style={{ fontFamily: SAN, color: C.amberDeep, fontSize: 14 }}>{error}</p>;
  if (!cards) return null;
  return <div style={{ display: "grid", gap: 14, marginTop: 4 }}>{cards.map((c, i) => <Card key={i} text={c} index={i} noun={noun} onRefine={onRefine} />)}</div>;
}

// helper to build a standard text/textarea tool quickly is avoided for clarity; each tool is explicit below.

// ============ OUTREACH ============
function FollowUp() {
  const [name, setName] = useState(""); const [ctx, setCtx] = useState(""); const [channel, setChannel] = useState("Text"); const [tone, setTone] = useState("Warm"); const t = useTool();
  const run = () => { if (!ctx.trim()) return t.setError("Tell me a bit about the lead first.");
    t.generate("You are an elite real estate sales coach writing follow-up messages for an agent. Natural, human, non-pushy messages that move things forward and invite a reply. Keep " + channel.toLowerCase() + "s brief. Tone: " + tone + ". Return exactly 3 distinct messages separated by a line containing only ===. No preamble or labels.", "Lead name: " + (name || "(unknown)") + "\nChannel: " + channel + "\nSituation:\n" + ctx); };
  return (<div>
    <Field label="Lead's first name (optional)"><input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Maya" /></Field>
    <Field label="What's going on with this lead?"><textarea style={{ ...inputStyle, minHeight: 90 }} value={ctx} onChange={(e) => setCtx(e.target.value)} placeholder="Inquired about the 3-bed on Oak St two weeks ago, went quiet. First-time buyer, nervous about budget." /></Field>
    <div style={{ display: "flex", gap: 28, flexWrap: "wrap", marginBottom: 18 }}>
      <Field label="Channel"><Chips options={["Text", "Email", "DM"]} value={channel} onChange={setChannel} /></Field>
      <Field label="Tone"><Chips options={["Warm", "Direct", "Playful", "Professional"]} value={tone} onChange={setTone} /></Field>
    </div>
    <RunButton onClick={run} loading={t.loading}>Write follow-ups →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Objection() {
  const [obj, setObj] = useState(""); const t = useTool();
  const presets = ["We want to wait until prices come down.", "Your commission is too high.", "We're going to try selling it ourselves first.", "We need to think about it."];
  const run = () => { if (!obj.trim()) return t.setError("Paste the objection you're hearing.");
    t.generate("You are a master real estate sales coach. The agent pastes a client objection. Give 3 genuinely different responses (empathize & reframe / ask a clarifying question / address head-on with value). Each sayable almost verbatim, confident, never slimy. Start each with a 2-4 word strategy label in brackets. Separate the 3 with a line containing only ===.", "Objection: " + obj); };
  return (<div>
    <Field label="The objection"><textarea style={{ ...inputStyle, minHeight: 80 }} value={obj} onChange={(e) => setObj(e.target.value)} placeholder="Type or paste what the client said…" /></Field>
    <div style={{ marginBottom: 18 }}><span style={{ fontFamily: SAN, fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.faint, display: "block", marginBottom: 8 }}>common ones</span>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{presets.map((p) => <button key={p} onClick={() => setObj(p)} style={{ fontFamily: SAN, fontSize: 12.5, padding: "6px 11px", borderRadius: 999, cursor: "pointer", border: `1.5px dashed ${C.line}`, background: "transparent", color: C.faint }}>{p}</button>)}</div></div>
    <RunButton onClick={run} loading={t.loading}>Coach me →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Warmup() {
  const [list, setList] = useState(""); const [angle, setAngle] = useState("Check in"); const t = useTool();
  const run = () => { const lines = list.split("\n").map((l) => l.trim()).filter(Boolean);
    if (!lines.length) return t.setError("Paste at least one lead — one per line.");
    if (lines.length > 12) return t.setError("Keep it to 12 leads per batch so each message gets real attention.");
    t.generate("You are a real estate re-engagement specialist. The agent pastes cold leads, one per line (name + notes). Write ONE short personalized re-engagement text per lead — casual, specific to their notes, easy to reply to, no pressure. Overall angle: " + angle + ". Begin each with the lead's name in brackets, e.g. [Maya]. 1-3 sentences each. One per lead, same order, separated by a line containing only ===.", "Leads:\n" + lines.join("\n")); };
  return (<div>
    <Field label="Paste your old leads — one per line, add notes if you have them"><textarea style={{ ...inputStyle, minHeight: 120 }} value={list} onChange={(e) => setList(e.target.value)} placeholder={"Maya — wanted a 3-bed under 600k, went quiet in spring\nThe Patels — relocating for work, no firm timeline\nJordan — first-time buyer, nervous about rates"} /></Field>
    <Field label="Angle for the batch"><Chips options={["Check in", "Market update", "New listing", "Year-end nudge"]} value={angle} onChange={setAngle} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Warm them up →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="lead" onRefine={t.refine} /></div>
  </div>);
}

function Referral() {
  const [who, setWho] = useState("Past client"); const [ctx, setCtx] = useState(""); const [channel, setChannel] = useState("Text"); const t = useTool();
  const run = () => { t.generate("You are a real estate relationship coach. Write warm, low-pressure referral-ask messages that don't feel transactional — lead with genuine connection, then a soft ask for who they might know thinking of buying/selling. Audience: " + who + ". Channel: " + channel + ". Return 3 distinct versions separated by a line containing only ===.", "Audience: " + who + "\nAny context: " + (ctx || "(none)")); };
  return (<div>
    <Field label="Who are you asking?"><Chips options={["Past client", "Friend / sphere", "Recent buyer", "Recent seller"]} value={who} onChange={setWho} /></Field>
    <Field label="Any context? (optional)"><textarea style={{ ...inputStyle, minHeight: 70 }} value={ctx} onChange={(e) => setCtx(e.target.value)} placeholder="Closed their sale 6 months ago, we got along great. Spring market heating up." /></Field>
    <Field label="Channel"><Chips options={["Text", "Email", "DM"]} value={channel} onChange={setChannel} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Write the ask →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Voicemail() {
  const [scenario, setScenario] = useState("Expired listing"); const [name, setName] = useState(""); const [ctx, setCtx] = useState(""); const t = useTool();
  const run = () => { t.generate("You are a real estate cold-outreach coach. Produce a matched pair for this scenario: a 15-20 second VOICEMAIL script (natural, confident, leaves a reason to call back) and a paired FOLLOW-UP TEXT to send right after. Two sections, each starting with a bracketed label [Voicemail Script] then [Follow-Up Text], separated by a line containing only ===. Scenario: " + scenario + ".", "Scenario: " + scenario + "\nName: " + (name || "(unknown)") + "\nContext: " + (ctx || "(none)")); };
  return (<div>
    <Field label="Scenario"><Chips options={["Expired listing", "FSBO", "Cold lead", "Open-house follow-up", "Past client check-in"]} value={scenario} onChange={setScenario} /></Field>
    <Field label="Their name (optional)"><input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. the Garcias" /></Field>
    <Field label="Anything specific? (optional)"><textarea style={{ ...inputStyle, minHeight: 60 }} value={ctx} onChange={(e) => setCtx(e.target.value)} placeholder="Listing expired last week, was overpriced for the area." /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Build voicemail + text →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="part" onRefine={t.refine} /></div>
  </div>);
}

function Review() {
  const [name, setName] = useState(""); const [deal, setDeal] = useState("Helped them buy"); const [platform, setPlatform] = useState("Google"); const t = useTool();
  const run = () => { t.generate("You are a real estate client-experience coach. Write warm, specific, easy-yes review-request messages for " + platform + ". Reference the journey, make it effortless, include a clear spot for the review link as [REVIEW LINK]. Transaction: " + deal + ". Return 3 distinct versions separated by a line containing only ===.", "Client: " + (name || "(client)") + "\nTransaction: " + deal + "\nPlatform: " + platform); };
  return (<div>
    <Field label="Client's name (optional)"><input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Sam" /></Field>
    <Field label="What was the transaction?"><Chips options={["Helped them buy", "Helped them sell", "Both", "Helped them rent"]} value={deal} onChange={setDeal} /></Field>
    <Field label="Review platform"><Chips options={["Google", "Zillow", "Facebook", "Realtor.com"]} value={platform} onChange={setPlatform} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Ask for the review →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

// ============ SOCIAL CONTENT ============
function Content() {
  const [topic, setTopic] = useState(""); const [platform, setPlatform] = useState("Instagram"); const t = useTool();
  const run = () => { if (!topic.trim()) return t.setError("Give me a topic or angle to post about.");
    t.generate("You are a real estate social media strategist. Write 3 ready-to-post " + platform + " posts on the topic. Match platform voice/length. Strong hook, real value, soft CTA, tasteful line breaks, a few relevant hashtags where expected. Separate the 3 with a line containing only ===.", "Topic: " + topic + "\nPlatform: " + platform); };
  return (<div>
    <Field label="What do you want to post about?"><textarea style={{ ...inputStyle, minHeight: 80 }} value={topic} onChange={(e) => setTopic(e.target.value)} placeholder="5 things first-time buyers always forget to budget for." /></Field>
    <Field label="Platform"><Chips options={["Instagram", "Facebook", "LinkedIn", "TikTok", "X"]} value={platform} onChange={setPlatform} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Generate posts →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="option" onRefine={t.refine} /></div>
  </div>);
}

function Engagement() {
  const [offer, setOffer] = useState(""); const [keyword, setKeyword] = useState(""); const [action, setAction] = useState("Comment below"); const [dest, setDest] = useState(""); const [platform, setPlatform] = useState("Instagram"); const t = useTool();
  const run = () => { if (!offer.trim()) return t.setError("What are people getting? Describe the offer / lead magnet.");
    if (!keyword.trim()) return t.setError("Give me the trigger word people should send.");
    const how = action === "Text a keyword" ? "they TEXT the word \"" + keyword + "\"" + (dest ? " to " + dest : "") : action === "DM the keyword" ? "they DM the word \"" + keyword + "\"" : "they COMMENT the word \"" + keyword + "\" below";
    t.generate("You are a real estate social media strategist writing high-engagement lead-magnet posts for " + platform + ". Each offers something valuable and drives ONE clear action: " + how + " to receive it. Scroll-stopping hook, tease value, mild urgency/curiosity, unmissable CTA repeated near the end. Match platform voice/length, tasteful line breaks, an emoji or two if on-brand, a few relevant hashtags. Stay truthful, avoid fair-housing-risky language. Return 3 distinct versions separated by a line containing only ===.", "Offer: " + offer + "\nTrigger: " + keyword + "\nAction: " + how + "\nPlatform: " + platform); };
  return (<div>
    <Field label="What do they get? (the offer / lead magnet)"><textarea style={{ ...inputStyle, minHeight: 70 }} value={offer} onChange={(e) => setOffer(e.target.value)} placeholder="A free home-value report · this week's new listings · a first-time buyer's guide" /></Field>
    <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
      <div style={{ flex: "1 1 160px" }}><Field label="Trigger word"><input style={inputStyle} value={keyword} onChange={(e) => setKeyword(e.target.value.toUpperCase())} placeholder="VALUE" /></Field></div>
      <div style={{ flex: "1 1 160px" }}><Field label="Send it where? (optional)"><input style={inputStyle} value={dest} onChange={(e) => setDest(e.target.value)} placeholder="e.g. 555-0142" /></Field></div>
    </div>
    <Field label="How do they respond?"><Chips options={["Comment below", "Text a keyword", "DM the keyword"]} value={action} onChange={setAction} /></Field>
    <Field label="Platform"><Chips options={["Instagram", "Facebook", "LinkedIn", "TikTok", "X"]} value={platform} onChange={setPlatform} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Generate engagement posts →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="version" onRefine={t.refine} /></div>
  </div>);
}

const MILESTONES = {
  "Just Listed": "Announce a brand-new listing now live. Build excitement and urgency, tease the best features, invite DMs/showings.",
  "Just Closed": "Celebrate a closed/sold deal. Warm, grateful, client-centered (no private details), subtle prompt that you'd love to help others.",
  "Offer Accepted": "Announce a property is under contract / offer accepted. Congratulate, note it moved fast, invite buyers to act quickly on the next one.",
  "New Listing": "A coming-soon / new-to-market teaser. Create anticipation before it's live, invite people to ask for a preview.",
};
function Milestone() {
  const [type, setType] = useState("Just Listed"); const [details, setDetails] = useState(""); const [platform, setPlatform] = useState("Instagram"); const t = useTool();
  const run = () => { if (!details.trim()) return t.setError("Add the property / deal details for the post.");
    t.generate("You are a real estate social media strategist creating '" + type + "' announcement posts for " + platform + ". " + MILESTONES[type] + " Match platform voice/length, scroll-stopping first line, tasteful line breaks, an emoji or two if on-brand, 4-7 relevant hashtags. Stay truthful, avoid fair-housing-risky language. Return 3 distinct versions separated by a line containing only ===.", "Milestone: " + type + "\nPlatform: " + platform + "\nDetails:\n" + details); };
  return (<div>
    <Field label="Template"><Chips options={Object.keys(MILESTONES)} value={type} onChange={setType} /></Field>
    <Field label="Property / deal details"><textarea style={{ ...inputStyle, minHeight: 90 }} value={details} onChange={(e) => setDetails(e.target.value)} placeholder="123 Oak St — 3 bed / 2 bath bungalow, renovated kitchen, big backyard. Listed at $619k. Open house Saturday 1-3." /></Field>
    <Field label="Platform"><Chips options={["Instagram", "Facebook", "LinkedIn", "X"]} value={platform} onChange={setPlatform} /></Field>
    <div style={{ height: 6 }} />
    <RunButton onClick={run} loading={t.loading}>Generate {type} →</RunButton>
    <div style={{ marginTop: 22 }}><Results {...t} noun="version" onRefine={t.refine} /></div>
  </div>);
}

function ReelHooks() {
  const [topic, setTopic] = useState(""); const t = useTool();
  const run = () => { if (!topic.trim()) return t.setError("Give me a topic for the hooks.");
    t.generate("You are a short-form video expert for real estate agents. Write 10 scroll-stopping opening HOOKS (first lines for a Reel/TikTok) on the topic — varied styles (bold claim, question, mistake callout, number, contrarian, story tease). One hook each, no numbering, separated by a line containing only ===.", "Topic: " + topic); };

const ROSTER = {
  "1 buyer": [["Buyer", "b1"]],
  "2 buyers": [["Buyer 1", "b1"], ["Buyer 2", "b2"]],
  "Buyer + seller": [["Buyer", "b1"], ["Seller", "s1"]],

function anchorInstruction(anchors, signers) {
  const roster = ROSTER[signers];
  if (anchors === "DocuSign anchor tags") {
    const routing = roster.map((r, i) => "Recipient " + (i + 1) + " = " + r[0] + " (tokens \\" + r[1] + "_sig\\, \\" + r[1] + "_date\\, \\" + r[1] + "_init\\)").join("; ");
    return "END THE DOCUMENT with a signature section formatted for DocuSign auto-place (anchor text), following these rules EXACTLY: (1) First print a line 'DOCUSIGN ROUTING KEY — add recipients in this order: " + routing + "'. (2) Then for each signer, a labeled block. Put each anchor token ON ITS OWN LINE, with the human label on the line directly above it, and ONE blank line between each token so placed fields never overlap. (3) Use these EXACT tokens, each appearing ONCE only — for " + roster.map((r) => r[0] + ": \\" + r[1] + "_sig\\ (signature), \\" + r[1] + "_date\\ (date signed), \\" + r[1] + "_init\\ (initials)").join("; ") + ". (4) Tokens must be plain text, backslash-delimited, no spaces inside, and must not appear anywhere else in the document. Do not add tokens for signers not listed.";

  return "End with clearly labeled blank lines for each signer (" + roster.map((r) => r[0]).join(", ") + "), each with a signature line, a date line, and an initials line.";

const PDFJS_SRC = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
const PDFJS_WORKER = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
function loadPdfjs() {
  return new Promise((resolve, reject) => {
    if (typeof window !== "undefined" && window.pdfjsLib) return resolve(window.pdfjsLib);
    const s = document.createElement("script");
    s.src = PDFJS_SRC;
    s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; resolve(window.pdfjsLib); };
    s.onerror = () => reject(new Error("Couldn't load the PDF reader."));
    document.head.appendChild(s);
  });
}
async function extractPdf(file) {
  const pdfjsLib = await loadPdfjs();
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const c = await page.getTextContent();
    text += c.items.map((i) => i.str).join(" ") + "\n";
  }
  return text.trim();
}

    if (usable.length < 2) return setUErr("Need at least two readable PDFs. Scanned files can't be read yet.");
    setBusy(true);
    try {
      const r = await fetch(be.url.trim(), { method: "POST", headers: { "Content-Type": "application/json", "x-app-key": be.key.trim() }, body: JSON.stringify({ offers: usable.map((f) => ({ name: f.name, text: f.text })), priorities }) });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Request failed.");
      setUOut(data.analysis);
    } catch (e) { setUErr(e.message); } finally { setBusy(false); }
  };

  const modeBtn = (id, label) => <button onClick={() => setMode(id)} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 700, padding: "7px 14px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${mode === id ? C.ink : C.line}`, background: mode === id ? C.ink : "transparent", color: mode === id ? C.cream : C.faint }}>{label}</button>;

  return (<div>

    {mode === "paste" && (<div>

          <textarea style={{ ...inputStyle, minHeight: 80 }} value={o.text} onChange={(e) => setText(o.id, e.target.value)} placeholder={i === 0 ? "Price $620k, conventional, 20% down, pre-approved. EM $12k. Inspection 7 days. Appraisal gap covered to $10k. Close 25 days." : "Paste this offer's key terms…"} />

      <Field label="What does your client care about most? (optional)"><input style={inputStyle} value={priorities} onChange={(e) => setPriorities(e.target.value)} placeholder="Max net proceeds · fastest, cleanest close · certainty over top dollar" /></Field>
      <RunButton onClick={run} loading={t.loading}>Compare & recommend →</RunButton>
      <div style={{ marginTop: 22 }}><Results {...t} noun="analysis" onRefine={t.refine} /></div>

    {mode === "upload" && (<div>

            <p style={{ fontFamily: SAN, fontSize: 13.5, color: C.faint, marginTop: 6, maxWidth: 540, lineHeight: 1.5 }}>Follow up faster, handle objections cleaner, post more often — without the blank-page grind.</p>
          </div>

          <div style={{ maxWidth: 820, margin: "0 auto", padding: "18px 28px 0" }}>
            {GROUPS.map((g) => (
              <div key={g.name} style={{ marginBottom: 14 }}>
                <div style={{ fontFamily: SAN, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.6, color: C.faint, marginBottom: 7 }}>{g.name}</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {g.tabs.map((x) => { const on = x.id === tab; return <button key={x.id} onClick={() => setTab(x.id)} style={{ fontFamily: SAN, fontSize: 13, fontWeight: 600, padding: "8px 13px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${on ? C.ink : C.line}`, background: on ? C.ink : "transparent", color: on ? C.cream : C.faint }}>{x.label}</button>; })}
                </div>
              </div>
            ))}
          </div>

          <div style={{ maxWidth: 820, margin: "8px auto 0", padding: 28, background: C.paper, border: `1.5px solid ${C.ink}`, borderRadius: 2 }}>
            <p style={{ fontFamily: SER, fontStyle: "italic", fontSize: 17, color: C.moss, marginTop: 0, marginBottom: 22 }}>{meta.sub}</p>
            <Active />
          </div>

          <p style={{ maxWidth: 820, margin: "18px auto 0", padding: "0 28px", fontFamily: SAN, fontSize: 11.5, color: C.faint, lineHeight: 1.5 }}>Drafts are AI-generated — read before you send, and follow your local real estate advertising, fair-housing & consent (e.g. TCPA) rules. Brand details and saved items last for this session only.</p>
        </div>
        <SavedDrawer open={drawer === "saved"} onClose={() => setDrawer(null)} />
        <ProfileDrawer open={drawer === "brand"} onClose={() => setDrawer(null)} />
        <BackendDrawer open={drawer === "backend"} onClose={() => setDrawer(null)} onChange={() => setConnTick((n) => n + 1)} />
      </SavedCtx.Provider>
    </ProfileCtx.Provider>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
